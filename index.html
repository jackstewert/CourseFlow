<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>CourseFlow</title>
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon copy.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg:#0a0e1a; --bg2:#111827; --bgc:#161d2e; --bgh:#1e2740; --bgs:#0d1220;
  --ac:#10e68c; --acd:#0bbf76; --acg:rgba(16,230,140,.15); --ac2:#4f8ef7;
  --t1:#e8edf5; --t2:#8b95a8; --tm:#4a5568;
  --bd:#1e2d45; --bdl:#263548;
  --red:#f56565; --pur:#a78bfa;
  --rl:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);-webkit-text-size-adjust:100%;position:fixed;inset:0}
#root{display:flex;position:fixed;inset:0;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdl);border-radius:4px}

/* ── Sidebar ── */
.sb{width:68px;background:var(--bgs);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:6px;flex-shrink:0;z-index:10;overflow-y:auto;overflow-x:hidden}
.sb-logo{width:40px;height:40px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#0a0e1a;cursor:pointer;flex-shrink:0}
.sb-div{width:32px;height:1px;background:var(--bd);margin:6px 0;flex-shrink:0}
.sb-item{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;position:relative;flex-shrink:0;border:2px solid transparent}
.sb-item:hover{background:var(--bgh)}
.sb-item.on{background:var(--acg);border-color:var(--ac)}
.sb-tip{position:absolute;left:56px;background:#1e2740;color:var(--t1);font-size:12px;padding:4px 10px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;border:1px solid var(--bdl);z-index:100}
.sb-item:hover .sb-tip{opacity:1}
.co-icon{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

/* ── Layout ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{min-height:60px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;padding-top:env(safe-area-inset-top,0);flex-wrap:wrap}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;flex:1}
.topbar-title span{color:var(--ac)}
.content{flex:1;overflow-y:auto;padding:28px;-webkit-overflow-scrolling:touch}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .12s,transform .12s;font-family:inherit;line-height:1}
.btn-p{background:var(--ac);color:#0a0e1a}
.btn-p:hover{background:var(--acd);transform:translateY(-1px)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-s{background:transparent;color:var(--t2);border:1px solid var(--bdl)}
.btn-s:hover{background:var(--bgh);color:var(--t1)}
.btn-d{background:transparent;color:var(--red);border:1px solid rgba(245,101,101,.3)}
.btn-d:hover{background:rgba(245,101,101,.1)}
.btn-sm{padding:5px 12px;font-size:12px}
.ib{width:28px;height:28px;border-radius:6px;background:rgba(10,14,26,.7);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:background .12s;flex-shrink:0}
.ib:hover{background:var(--bgh)}
.xb{width:28px;height:28px;border-radius:6px;background:transparent;border:none;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1;transition:background .12s}
.xb:hover{background:var(--bgh);color:var(--t1)}

/* ── Forms ── */
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.04em;text-transform:uppercase}
.fi,.fta,.fsel{background:var(--bg2);border:1px solid var(--bdl);border-radius:8px;color:var(--t1);font-family:inherit;font-size:15px;padding:10px 12px;outline:none;transition:border-color .12s;width:100%;-webkit-appearance:none;appearance:none}
.fi:focus,.fta:focus,.fsel:focus{border-color:var(--ac)}
.fta{resize:vertical;min-height:80px}
.fsel{cursor:pointer}
.si-wrap{position:relative}
.si{padding-left:34px!important}
.si-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tm);font-size:14px;pointer-events:none}

/* ── Modal ── */
.mbk{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.mo{background:var(--bgc);border-radius:var(--rl);border:1px solid var(--bdl);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.mh{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mt{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.mb{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.mf{padding:16px 24px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:8px;padding:3px}
.tabk{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--t2);transition:background .12s,color .12s;font-family:inherit}
.tabk.on{background:var(--bgc);color:var(--t1)}

/* ── Home page ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.st{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.sc{font-size:13px;color:var(--t2);margin-left:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
.sort-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sk{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bdl);background:transparent;color:var(--t2);transition:all .12s;font-family:inherit}
.sk.on{border-color:var(--ac);color:var(--ac);background:var(--acg)}
.sk:hover:not(.on){background:var(--bgh);color:var(--t1)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;cursor:pointer;border:1.5px solid var(--bd);background:var(--bgc);font-size:12.5px;font-weight:600;transition:all .12s}
.chip:hover{border-color:var(--bdl);background:var(--bgh)}
.chip.on{border-color:var(--ac);background:var(--acg);color:var(--ac)}

/* ── Course card ── */
.card{background:var(--bgc);border-radius:var(--rl);overflow:hidden;cursor:pointer;border:1px solid var(--bd);transition:border-color .15s,transform .15s,box-shadow .15s;position:relative}
.card:hover{border-color:var(--bdl);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.c-thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.c-thumb img{width:100%;height:100%;object-fit:cover}
.c-ph{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
.c-badge{position:absolute;bottom:8px;right:8px;width:28px;height:28px;border-radius:6px;background:rgba(10,14,26,0);border:0px solid var(--bd);display:flex;align-items:center;justify-content:center;overflow:hidden}
.c-resume{position:absolute;bottom:8px;left:8px;background:rgba(16,230,140,.92);color:#0a0e1a;font-size:10px;font-weight:800;padding:3px 8px;border-radius:5px;letter-spacing:.04em}
.c-body{padding:14px 16px 16px}
.c-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:5px;line-height:1.3}
.c-desc{font-size:12.5px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
.g0{background:linear-gradient(135deg,#1a2a4a,#0d3d2b)}
.g1{background:linear-gradient(135deg,#2d1a4a,#1a0d3d)}
.g2{background:linear-gradient(135deg,#4a1a1a,#3d0d0d)}
.g3{background:linear-gradient(135deg,#1a4a2d,#0d3d1a)}
.g4{background:linear-gradient(135deg,#4a3a1a,#3d2d0d)}
.g5{background:linear-gradient(135deg,#1a3a4a,#0d2d3d)}

/* ── Progress bar ── */
.pw{margin-top:4px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--tm);margin-bottom:5px}
.pb{height:3px;background:var(--bd);border-radius:10px;overflow:hidden}
.pf{height:100%;background:var(--ac);border-radius:10px;transition:width .3s}

/* ── Empty state ── */
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:16px}
.es-ico{font-size:56px;opacity:.3}
.es-t{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--t2)}
.es-s{font-size:14px;color:var(--tm);max-width:300px;line-height:1.6}

/* ── Course page ── */
.cp{display:flex;height:100%;overflow:hidden}
.ci{width:280px;flex-shrink:0;background:var(--bgs);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.ci-hd{padding:16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ci-lbl{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:10px}
.ci-ttl{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.4;margin-bottom:10px}
.ci-list{flex:1;overflow-y:auto;padding:10px 0;-webkit-overflow-scrolling:touch}
.ci-add{padding:10px 16px;border-top:1px solid var(--bd);flex-shrink:0}
.modh{padding:20px 16px 6px}
.modlbl{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--tm)}

/* ── Chapter row ── */
.cr{display:flex;align-items:center;gap:12px;padding:11px 14px 11px 20px;cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.cr:hover{background:var(--bgh)}
.cr.on{background:var(--acg);border-left-color:var(--ac)}
.cn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.05);border:1.5px solid var(--bdl);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--t2);transition:all .12s}
.cr.on .cn{background:var(--ac);border-color:var(--ac);color:#0a0e1a}
.cr.dn .cn{background:var(--acd);border-color:var(--acd);color:#0a0e1a}
.ci2{flex:1;min-width:0}
.cn2{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t2);line-height:1.3}
.cr.on .cn2{color:var(--t1)}
.cm{display:flex;align-items:center;gap:6px;margin-top:3px}
.cbv{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:800;letter-spacing:.04em}
.bv{background:rgba(79,142,247,.18);color:var(--ac2)}
.bt{background:rgba(167,139,250,.18);color:var(--pur)}
.cd{font-size:10.5px;color:var(--tm)}
.cr-acts{display:flex;gap:4px;opacity:0;transition:opacity .1s;flex-shrink:0}
.cr:hover .cr-acts{opacity:1}

/* ── Content area ── */
.cm2{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ctb{min-height:56px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
.cttl{flex:1;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cca{flex:1;display:flex;overflow:hidden}
.cv{flex:1;overflow-y:auto;padding:24px;-webkit-overflow-scrolling:touch}

/* ── Video player ── */
.vw{width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--rl);overflow:hidden;margin-bottom:20px;position:relative}
.vw iframe{width:100%;height:100%;border:none;display:block}
.vsk{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bgc);border-radius:var(--rl);z-index:2;transition:opacity .25s}
.vsk.hidden{opacity:0;pointer-events:none}
.vsk-spin{width:40px;height:40px;border-radius:50%;border:3px solid var(--bdl);border-top-color:var(--ac);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.vsk-txt{font-size:13px;color:var(--tm);font-weight:600}
.vno-url{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:var(--bgc);border-radius:var(--rl);color:var(--tm);font-size:14px;margin-bottom:20px;border:2px dashed var(--bdl)}

/* ── Chapter content blocks ── */
.ds{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;margin-bottom:20px}
.ds-t{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.ds-p{font-size:14px;color:var(--t2);line-height:1.7;white-space:pre-wrap}
.ll{display:flex;flex-direction:column;gap:6px}
.li{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ac2);padding:6px 0;text-decoration:none}
.li:hover{color:var(--ac)}
.fl2{display:flex;flex-direction:column;gap:8px}
.fi2{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bgh);border-radius:8px;border:1px solid var(--bd);text-decoration:none;color:inherit}
.fi2-n{font-size:13px;flex:1}

/* ── Mark complete ── */
.cbtn{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.chk{width:18px;height:18px;border-radius:4px;border:2px solid var(--bdl);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;font-size:11px;font-weight:700;color:#0a0e1a}
.chk.on{background:var(--ac);border-color:var(--ac)}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(.92)}100%{transform:scale(1)}}
.chk.pop{animation:pop .32s ease}

/* ── Notes panel ── */
.np{width:300px;flex-shrink:0;background:var(--bgc);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .18s}
.np.hide{width:0}
.np-hd{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.np-lbl{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2)}
.na{flex:1;padding:12px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.nta{width:100%;flex:1;background:var(--bg2);border:1px solid var(--bdl);border-radius:8px;color:var(--t1);font-family:inherit;font-size:14px;padding:12px;outline:none;resize:none;transition:border-color .12s;min-height:0;-webkit-appearance:none}
.nta:focus{border-color:var(--ac)}
.nsv{font-size:11px;color:var(--ac);text-align:right;height:14px;flex-shrink:0}

/* ── Global notes page ── */
.ngl{display:flex;flex-direction:column;gap:14px}
.nc{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;cursor:pointer;transition:border-color .12s}
.nc:hover{border-color:var(--bdl)}
.nc-co{font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.nc-ch{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:8px}
.nc-pv{font-size:13px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.nc-pv mark{background:rgba(16,230,140,.22);color:var(--ac);border-radius:2px;padding:0 2px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ac);color:#0a0e1a;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:3000;white-space:nowrap;pointer-events:none}

/* ── Mobile nav ── */
.mbn{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bgs);border-top:1px solid var(--bd);padding-bottom:max(env(safe-area-inset-bottom),16px);z-index:200;flex-direction:row;align-items:stretch}
.mni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:8px 4px;min-height:52px;border:none;background:transparent;color:var(--tm);font-size:10px;font-family:inherit;font-weight:600;transition:color .12s}
.mni.on{color:var(--ac)}
.mni-i{font-size:20px;line-height:1}

/* ── Mobile slide-in sidebar ── */
.mss{position:fixed;inset:0;z-index:500;pointer-events:none;display:flex}
.mss.open{pointer-events:all}
.mss-bk{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1;opacity:0;transition:opacity .22s}
.mss.open .mss-bk{opacity:1}
.mss-pn{position:absolute;top:0;bottom:0;left:0;width:80%;max-width:320px;background:var(--bgs);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top);z-index:2;transform:translateX(-100%);transition:transform .22s}
.mss.open .mss-pn{transform:translateX(0)}

/* ── Mobile bottom sheet (notes) ── */
.mns{position:fixed;inset:0;z-index:500;pointer-events:none;display:flex;flex-direction:column;justify-content:flex-end}
.mns.open{pointer-events:all}
.mns-bk{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;transition:opacity .28s}
.mns.open .mns-bk{opacity:1}
.mns-pn{position:relative;z-index:1;background:var(--bgc);border-radius:20px 20px 0 0;border-top:1px solid var(--bdl);display:flex;flex-direction:column;height:72vh;padding-bottom:env(safe-area-inset-bottom);transform:translateY(100%);transition:transform .28s}
.mns.open .mns-pn{transform:translateY(0)}
.mns-hnd{width:36px;height:4px;background:var(--bdl);border-radius:2px;margin:10px auto 6px;flex-shrink:0}

/* ── Responsive ── */
@media(max-width:768px){
  .ci{width:220px}.np{width:240px}.grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .sb{display:none!important}.dsk{display:none!important}.mbn{display:flex}
  .main{padding-bottom:calc(52px + max(env(safe-area-inset-bottom),16px))}
  .topbar{padding:max(12px,env(safe-area-inset-top)) 16px 10px;gap:8px}
  .topbar-title{font-size:16px;flex:none}
  .topbar .si-wrap{order:10;width:100%}
  .grid{grid-template-columns:1fr;gap:14px}
  .ib{width:36px;height:36px;font-size:14px}
  .content{padding:16px}
  .cp{flex-direction:column}.ci{display:none!important}.np{display:none!important}
  .ctb{padding:max(10px,env(safe-area-inset-top)) 12px 10px}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─────────────────────────────────────────────
// Constants & storage
// ─────────────────────────────────────────────
const DATA_KEY   = 'courseflow_v2';
const RESUME_KEY = 'courseflow_resume';
const ACCENT_COLORS = ['#10e68c','#4f8ef7','#f56565','#f6c90e','#a78bfa','#fb923c'];
const SORTS = [
  { k:'recent',   l:'⏱ Recent'   },
  { k:'added',    l:'Date Added' },
  { k:'az',       l:'A–Z'        },
  { k:'progress', l:'Completed'  },
];
const EMPTY = { companies:[], courses:[] };

// ── Firebase config — fill these in after creating your project ──
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCXKu18ONnWJx8Jt4zVBu1BEze68olXvNg",
  authDomain:        "courseflow-7e19f.firebaseapp.com",
  projectId:         "courseflow-7e19f",
  storageBucket:     "courseflow-7e19f.firebasestorage.app",
  messagingSenderId: "1042718851199",
  appId:             "1:1042718851199:web:852906be7d21cd1c0b3f4a",
};
const FIREBASE_CONFIGURED = !FIREBASE_CONFIG.apiKey.startsWith('REPLACE');

// ── AES-GCM encryption helpers ──
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:200000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function encryptData(plaintext, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(password, salt);
  const ct   = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, new TextEncoder().encode(plaintext));
  const buf  = new Uint8Array(16 + 12 + ct.byteLength);
  buf.set(salt,0); buf.set(iv,16); buf.set(new Uint8Array(ct),28);
  return btoa(String.fromCharCode(...buf));
}
async function decryptData(b64, password) {
  const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const key = await deriveKey(password, buf.slice(0,16));
  const pt  = await crypto.subtle.decrypt({ name:'AES-GCM', iv: buf.slice(16,28) }, key, buf.slice(28));
  return new TextDecoder().decode(pt);
}

// ── Firebase singleton ──
let _db = null;
function getDb() {
  if (_db) return _db;
  if (!FIREBASE_CONFIGURED) return null;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.firestore();
    return _db;
  } catch(e) { console.error('Firebase init failed', e); return null; }
}

// ── Cloud save / load ──
async function cloudSave(key, value, password) {
  const db = getDb(); if (!db) return;
  const encrypted = await encryptData(JSON.stringify(value), password);
  await db.collection('courseflow').doc(key).set({ data: encrypted, updatedAt: Date.now() });
}
async function cloudLoad(key, password) {
  const db = getDb(); if (!db) return null;
  try {
    const snap = await db.collection('courseflow').doc(key).get();
    if (!snap.exists) return null;
    const json = await decryptData(snap.data().data, password);
    return JSON.parse(json);
  } catch(e) {
    // Re-throw Firestore errors (network, permissions) so caller can distinguish
    if (e && e.code) throw e;
    return null; // decryption failure = wrong password
  }
}

// ── localStorage fallback (cache / offline) ──
function loadData()   { try { const d = JSON.parse(localStorage.getItem(DATA_KEY));   return (d && d.courses) ? d : EMPTY; } catch { return EMPTY; } }
function saveData(d)  { try { localStorage.setItem(DATA_KEY,   JSON.stringify(d)); }  catch {} }
function loadResume() { try { return JSON.parse(localStorage.getItem(RESUME_KEY) || '{}'); } catch { return {}; } }
function saveResume(m){ try { localStorage.setItem(RESUME_KEY, JSON.stringify(m)); }  catch {} }

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 10);
const haptic = (t = 'light') => { try { navigator.vibrate?.(t === 'medium' ? [30,20,30] : 50); } catch {} };
const pct = c => { const t = c.chapters?.length || 0, d = c.chapters?.filter(x => x.completed).length || 0; return t > 0 ? Math.round(d / t * 100) : 0; };
const faviconUrl = url => {
  if (!url) return null;
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url.startsWith('http') ? url : 'https://' + url).hostname}&sz=64`; }
  catch { return null; }
};
const downloadJson = (data, filename) => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
};

// ─────────────────────────────────────────────
// Video URL parsing
// ─────────────────────────────────────────────
function parseVideoUrl(url) {
  if (!url) return { type: 'none' };

  // YouTube
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  if (yt) {
    const start = url.match(/[?&](?:t|start)=(\d+)/);
    return { type: 'youtube', id: yt[1], start: start ? parseInt(start[1]) : 0 };
  }

  // Vimeo
  const vm = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (vm) return { type: 'vimeo', id: vm[1] };

  // Google Drive
  if (url.includes('drive.google.com') || url.includes('docs.google.com')) {
    // Format 1: /file/d/{ID}/view|edit|preview
    const f1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (f1) return { type: 'gdrive', id: f1[1] };
    // Format 2: ?id={ID} or &id={ID}  (open?id=, uc?id=, etc.)
    const f2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (f2) return { type: 'gdrive', id: f2[1] };
    return { type: 'none' };
  }

  // Wistia
  if (url.includes('wistia')) {
    const wid = url.match(/(?:medias|iframe)\/([a-zA-Z0-9]+)/);
    return { type: 'wistia', id: wid ? wid[1] : url.split('/').pop() };
  }

  // Hotmart or generic embed
  if (url.startsWith('https')) return { type: 'embed', src: url };

  return { type: 'none' };
}

function buildEmbedSrc(parsed) {
  switch (parsed.type) {
    case 'youtube': return `https://www.youtube.com/embed/${parsed.id}?enablejsapi=1${parsed.start ? `&start=${parsed.start}` : ''}&origin=${encodeURIComponent(location.origin)}`;
    case 'vimeo':   return `https://player.vimeo.com/video/${parsed.id}?title=0&byline=0&portrait=0`;
    case 'gdrive':  return `https://drive.google.com/file/d/${parsed.id}/preview`;
    case 'wistia':  return `https://fast.wistia.net/embed/iframe/${parsed.id}`;
    case 'embed':   return parsed.src;
    default:        return null;
  }
}

// ─────────────────────────────────────────────
// VideoPlayer
// ─────────────────────────────────────────────
function VideoPlayer({ url, videoKey, onEnded }) {
  const parsed = useMemo(() => parseVideoUrl(url), [url]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => { setLoaded(false); }, [videoKey]);

  useEffect(() => {
    if (parsed.type !== 'youtube') return;
    const handler = e => {
      try {
        const d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        if (d?.event === 'onStateChange' && d?.info === 0) onEnded?.();
      } catch {}
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, [parsed.type, onEnded]);

  if (parsed.type === 'none') {
    return (
      <div className="vno-url">
        <span style={{fontSize:36}}>▶</span>
        <span>No video URL set</span>
      </div>
    );
  }

  // Google Drive: use a tall fixed-height container so Drive's native
  // player chrome (toolbar + controls) isn't clipped by a 16/9 box.
  if (parsed.type === 'gdrive') {
  return (
    <div style={{
      width: '100%',
      aspectRatio: '16 / 9',
      borderRadius: 'var(--rl)',
      overflow: 'hidden',
      marginBottom: 20,
      background: '#000'
    }}>
      <iframe
        key={videoKey}
        src={buildEmbedSrc(parsed)}
        style={{ width: '100%', height: '100%', border: 'none' }}
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowFullScreen
      />
    </div>
  );
}

  return (
    <div className="vw">
      <div className={`vsk ${loaded ? 'hidden' : ''}`}>
        <div className="vsk-spin" /><span className="vsk-txt">Loading video…</span>
      </div>
      <iframe
        key={videoKey}
        src={buildEmbedSrc(parsed)}
        allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
        allowFullScreen
        onLoad={() => setLoaded(true)}
      />
    </div>
  );
}

function ProgBar({ done, total, compact = false }) {

// ChapterList

function ChapterList({ chapters, activeIdx, onSelect, onEdit, onDelete, mobile = false }) {

    const thisMod = ch.module || '';

              {ch.duration && <span className="cd">{ch.duration}</span>}

}

// ─────────────────────────────────────────────
// AddCourseModal
// ─────────────────────────────────────────────
function AddCourseModal({ companies, courses, editCourse, onClose, onSave }) {
  const [title,    setTitle]    = useState(editCourse?.title || '');
  const [thumb,    setThumb]    = useState(editCourse?.thumbnail || '');
  const [coId,     setCoId]     = useState(editCourse?.companyId || '');
  const [desc,     setDesc]     = useState(editCourse?.description || '');
  const [addingCo, setAddingCo] = useState(false);
  const [newName,  setNewName]  = useState('');
  const [newUrl,   setNewUrl]   = useState('');
  const [newIcon,  setNewIcon]  = useState('');

  const save = () => {
    if (!title.trim()) return;
    onSave({ title: title.trim(), thumbnail: thumb.trim(), companyId: coId, description: desc.trim() });
  };

  const addPlatform = () => {
    if (!newName.trim()) return;
    if (companies.some(c => c.name.toLowerCase() === newName.toLowerCase())) { alert('Platform already exists'); return; }
    const co = { id: uid(), name: newName.trim(), url: newUrl.trim(), icon: newIcon.trim() || undefined };
    onSave(null, co, null, co.id); // signal: add company + select it
    setAddingCo(false); setNewName(''); setNewUrl(''); setNewIcon('');
  };

  const deletePlatform = () => {
    if (courses.some(c => c.companyId === coId)) { alert('Cannot delete: platform is used by other courses'); return; }
    onSave(null, null, coId); // signal: delete company
    setCoId('');
  };

  return (
    <div className="mbk" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="mo">
        <div className="mh">
          <span className="mt">{editCourse ? 'Edit Course' : 'Add Course'}</span>
          <button className="xb" onClick={onClose}>×</button>
        </div>
        <div className="mb">
          <div className="fg">
            <label className="fl">Course Title *</label>
            <input className="fi" placeholder="e.g. Complete JavaScript Bootcamp" value={title} onChange={e=>setTitle(e.target.value)} autoFocus />
          </div>
          <div className="fg">
            <label className="fl">Thumbnail URL</label>
            <input className="fi" placeholder="https://..." value={thumb} onChange={e=>setThumb(e.target.value)} />
          </div>
          <div className="fg">
            <label className="fl">Platform / Company</label>
            {!addingCo ? (
              <div style={{display:'flex',gap:8}}>
                <select className="fsel" style={{flex:1}} value={coId} onChange={e=>setCoId(e.target.value)}>
                  <option value="">— None —</option>
                  {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                {coId && <button className="btn btn-d btn-sm" onClick={deletePlatform}>🗑️</button>}
                <button className="btn btn-s btn-sm" onClick={() => setAddingCo(true)}>+ New</button>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:8,padding:12,background:'var(--bg2)',borderRadius:8,border:'1px solid var(--bdl)'}}>
                <input className="fi" placeholder="Platform name *" value={newName} onChange={e=>setNewName(e.target.value)} autoFocus />
                <input className="fi" placeholder="Website URL (for auto favicon)" value={newUrl} onChange={e=>setNewUrl(e.target.value)} />
                <input className="fi" placeholder="Custom icon URL (optional)" value={newIcon} onChange={e=>setNewIcon(e.target.value)} />
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-p btn-sm" onClick={addPlatform} disabled={!newName.trim()}>Add Platform</button>
                  <button className="btn btn-s btn-sm" onClick={() => setAddingCo(false)}>Cancel</button>
                </div>
              </div>
            )}
          </div>
          <div className="fg">
            <label className="fl">Description (optional)</label>
            <textarea className="fta" placeholder="Brief overview…" value={desc} onChange={e=>setDesc(e.target.value)} />
          </div>
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose}>Cancel</button>
          <button className="btn btn-p" onClick={save} disabled={!title.trim()}>{editCourse ? 'Save Changes' : 'Add Course'}</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// ChapterModal
// ─────────────────────────────────────────────
function ChapterModal({ chapter, onClose, onSave }) {
  const toLinks = a => (a || []).map(l => typeof l === 'string' ? {label:l,url:l} : l);
  const toFiles = a => (a || []).map(f => typeof f === 'string' ? {name:f,url:''} : f);

  const [name,     setName]     = useState(chapter?.name || '');
  const [module,   setModule]   = useState(chapter?.module || '');
  const [type,     setType]     = useState(chapter?.type || 'video');
  const [duration, setDuration] = useState(chapter?.duration || '');
  const [videoUrl, setVideoUrl] = useState(chapter?.videoUrl || '');
  const [desc,     setDesc]     = useState(chapter?.description || '');
  const [links,    setLinks]    = useState(toLinks(chapter?.links));
  const [files,    setFiles]    = useState(toFiles(chapter?.files));

  const save = () => {
    if (!name.trim()) return;
    onSave({ name: name.trim(), module, type, duration, videoUrl: videoUrl.trim(), description: desc, links, files });
  };

  const updLink = (i, field, val) => setLinks(p => { const u=[...p]; u[i]={...u[i],[field]:val}; return u; });

        </div>
        <div className="mb">
          <div className="tabs">
            {['basic','content','files'].map(t =>
              <button key={t} className={`tabk ${tab===t?'on':''}`} onClick={()=>setTab(t)}>
                {t[0].toUpperCase()+t.slice(1)}
              </button>
            )}
          </div>

          {tab === 'basic' && <>
            <div className="fg">
              <label className="fl">Chapter Name *</label>
              <input className="fi" placeholder="e.g. Introduction to Variables" value={name} onChange={e=>setName(e.target.value)} autoFocus />
            </div>
            <div className="fg">
              <label className="fl">Module / Section</label>
              <input className="fi" placeholder="e.g. Module 1: Foundations" value={module} onChange={e=>setModule(e.target.value)} />
