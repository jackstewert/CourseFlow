            </div>
            <div className="fg">
              <label className="fl">Chapter Type</label>
              <div style={{display:'flex',gap:8}}>
                {['video','text'].map(t =>
                  <button key={t} className={`btn ${type===t?'btn-p':'btn-s'}`} style={{flex:1}} onClick={()=>setType(t)}>
                    {t === 'video' ? '📹 Video' : '📝 Text Only'}
                  </button>
                )}
              </div>
            </div>
            <div className="fg">
              <label className="fl">Duration (optional)</label>
              <input className="fi" placeholder="e.g. 6:30 or 15 min" value={duration} onChange={e=>setDuration(e.target.value)} />
            </div>
          </>}

          {tab === 'content' && <>
            {type === 'video' && (
              <div className="fg">
                <label className="fl">Video URL</label>
                <input className="fi" placeholder="YouTube, Vimeo, Wistia, Google Drive, or any embed URL" value={videoUrl} onChange={e=>setVideoUrl(e.target.value)} />
                <span style={{fontSize:11,color:'var(--tm)'}}>YouTube, Vimeo, Wistia, or any embed URL. For Google Drive, the file must be shared as "Anyone with the link".</span>
              </div>
            )}
            <div className="fg">
              <label className="fl">Description / Notes</label>
              <textarea className="fta" style={{minHeight:120}} placeholder="Chapter notes, key points, code snippets…" value={desc} onChange={e=>setDesc(e.target.value)} />
            </div>
            <div className="fg">
              <label className="fl">Links</label>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {links.map((l,i) => (
                  <div key={i} style={{display:'flex',gap:6,alignItems:'center'}}>
                    <input className="fi" placeholder="Label" value={l.label||''} onChange={e=>updLink(i,'label',e.target.value)} />
                    <input className="fi" placeholder="https://…" value={l.url||''} onChange={e=>updLink(i,'url',e.target.value)} />
                    <button className="btn btn-d btn-sm" onClick={()=>setLinks(p=>p.filter((_,x)=>x!==i))}>×</button>
                  </div>
                ))}
                <button className="btn btn-s btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>setLinks(p=>[...p,{label:'',url:''}])}>+ Add Link</button>
              </div>
            </div>
          </>}

          {tab === 'files' && (
            <div className="fg">
              <label className="fl">Files</label>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {files.map((f,i) => (
                  <div key={i} style={{display:'flex',gap:6,alignItems:'center'}}>
                    <input className="fi" placeholder="File name" value={f.name||''} onChange={e=>updFile(i,'name',e.target.value)} />
                    <input className="fi" placeholder="https://…" value={f.url||''} onChange={e=>updFile(i,'url',e.target.value)} />
                    <button className="btn btn-d btn-sm" onClick={()=>setFiles(p=>p.filter((_,x)=>x!==i))}>×</button>
                  </div>
                ))}
                <button className="btn btn-s btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>setFiles(p=>[...p,{name:'',url:''}])}>+ Add File</button>
              </div>
            </div>
          )}
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose}>Cancel</button>
          <button className="btn btn-p" onClick={save} disabled={!name.trim()}>Save Chapter</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// ImportModal
// ─────────────────────────────────────────────
function ImportModal({ data, onClose, onImport }) {
  const [err,  setErr]  = useState('');
  const [file, setFile] = useState('');

  const process = raw => {
    try {
      const p = JSON.parse(raw);
      if (!p.courses || !p.companies) { setErr('Invalid format: missing courses or companies.'); return; }

      // Deduplicate + remap companies
      const existingNameMap = Object.fromEntries(data.companies.map(c => [c.name.toLowerCase(), c.id]));
      const idRemap = {};
      const newCompanies = [];
      p.companies.forEach(ic => {
        const existingId = existingNameMap[ic.name.toLowerCase()];
        if (existingId) { idRemap[ic.id] = existingId; }
        else { newCompanies.push(ic); existingNameMap[ic.name.toLowerCase()] = ic.id; }
      });

      const remapped = p.courses.map(c => ({ ...c, companyId: idRemap[c.companyId] || c.companyId }));

      // Merge: update existing courses with new chapters, add brand-new courses
      let newCourseCount = 0, newChapterCount = 0;
      const updatedCourses = data.courses.map(existing => {
        const match = remapped.find(ic =>
          ic.id === existing.id ||
          (ic.title.toLowerCase() === existing.title.toLowerCase() && (ic.companyId||'') === (existing.companyId||''))
        );
        if (!match) return existing;
        const existingIds   = new Set((existing.chapters||[]).map(ch => ch.id));
        const existingNames = new Set((existing.chapters||[]).map(ch => ch.name.toLowerCase()));
        const toAdd = (match.chapters||[]).filter(ch => !existingIds.has(ch.id) && !existingNames.has(ch.name.toLowerCase()));
        newChapterCount += toAdd.length;
        return { ...existing, chapters: [...(existing.chapters||[]), ...toAdd] };
      });

      const brandNew = remapped.filter(ic =>
        !data.courses.some(ec =>
          ec.id === ic.id ||
          (ic.title.toLowerCase() === ec.title.toLowerCase() && (ic.companyId||'') === (ec.companyId||''))
        )
      );
      newCourseCount = brandNew.length;

      const parts = [];
      if (newCourseCount   > 0) parts.push(`${newCourseCount} new course${newCourseCount!==1?'s':''}`);
      if (newChapterCount  > 0) parts.push(`${newChapterCount} new chapter${newChapterCount!==1?'s':''}`);
      const msg = parts.length > 0 ? `✓ Imported: ${parts.join(', ')}` : '✓ Nothing new to import';

      onImport({
        courses:   [...updatedCourses, ...brandNew],
        companies: [...data.companies, ...newCompanies]
      }, msg);
    } catch { setErr('Could not parse file. Make sure it is a valid CourseFlow JSON backup.'); }
  };

  const onFileChange = e => {
    const f = e.target.files[0]; if (!f) return;
    setFile(f.name); setErr('');
    const r = new FileReader(); r.onload = ev => process(ev.target.result); r.readAsText(f);
  };
  const onDrop = e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0]; if (!f) return;
    setFile(f.name); setErr('');
    const r = new FileReader(); r.onload = ev => process(ev.target.result); r.readAsText(f);
  };

  return (
    <div className="mbk" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mo">
        <div className="mh"><span className="mt">Import Backup</span><button className="xb" onClick={onClose}>×</button></div>
        <div className="mb">
          <div className="fg">
            <label className="fl">Upload JSON Backup</label>
            <input id="imp-file" type="file" accept=".json" style={{display:'none'}} onChange={onFileChange} />
            <label htmlFor="imp-file" onDrop={onDrop} onDragOver={e=>e.preventDefault()}
              style={{border:'2px dashed var(--bdl)',borderRadius:10,padding:24,textAlign:'center',cursor:'pointer',display:'block'}}>
              <div style={{marginBottom:10,fontSize:13,color:'var(--t2)'}}>📁 Drag & drop or click to choose</div>
              <span className="btn btn-s btn-sm">Choose File</span>
              {file && <div style={{marginTop:10,fontSize:12,color:'var(--ac)'}}>{file}</div>}
            </label>
          </div>
          {err && <div style={{color:'var(--red)',fontSize:13}}>{err}</div>}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// GlobalNotesPage
// ─────────────────────────────────────────────
function GlobalNotesPage({ data, onOpenCourse }) {
  const [search, setSearch] = useState('');
  const q = search.trim().toLowerCase();

  const { all, filtered } = useMemo(() => {
    const all = [];
    data.courses.forEach(course => {
      (course.chapters || []).forEach((ch, idx) => {
        if (ch.notes?.trim()) all.push({ course, chapter: ch, idx });
      });
    });
    const filtered = q ? all.filter(n =>
      n.chapter.notes.toLowerCase().includes(q) ||
      n.chapter.name.toLowerCase().includes(q)  ||
      n.course.title.toLowerCase().includes(q)
    ) : all;
    return { all, filtered };
  }, [data.courses, q]);

  const hl = text => {
    if (!q) return text;
    const lo = text.toLowerCase(), i = lo.indexOf(q);
    if (i < 0) return text;
    return <>{text.slice(0,i)}<mark>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="topbar">
        <span className="topbar-title">📓 <span>My Notes</span></span>
        <div className="si-wrap">
          <span className="si-ico">🔍</span>
          <input className="fi si" placeholder="Search notes…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:220}} />
        </div>
      </div>
      <div className="content">
        {all.length === 0
          ? <div className="es"><div className="es-ico">📓</div><div className="es-t">No notes yet</div><div className="es-s">Open any course chapter and write notes — they'll all appear here.</div></div>
          : filtered.length === 0
            ? <div className="es"><div className="es-ico">🔍</div><div className="es-t">No matches</div><div className="es-s">No notes match "{search}".</div></div>
            : <>
                <div style={{marginBottom:16,fontSize:13,color:'var(--tm)'}}>{filtered.length} note{filtered.length!==1?'s':''}{q?` matching "${search}"`:''} — click to jump</div>
                <div className="ngl">
                  {filtered.map(({ course, chapter, idx }) => (
                    <div key={`${course.id}-${idx}`} className="nc" onClick={() => onOpenCourse(course.id, idx, true)}>
                      <div className="nc-co">{course.title}</div>
                      <div className="nc-ch">Ch.{idx+1} — {chapter.name}</div>
                      <div className="nc-pv">{hl(chapter.notes)}</div>
                    </div>
                  ))}
                </div>
              </>
        }
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// HomePage
// ─────────────────────────────────────────────
function HomePage({ data, onUpdate, onOpenCourse, filterCompany, setFilterCompany, resumeMap, triggerImport, setTriggerImport, triggerAdd, setTriggerAdd }) {
  const [showAdd,    setShowAdd]    = useState(false);
  const [editCourse, setEditCourse] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [search,     setSearch]     = useState('');
  const [sortBy,     setSortBy]     = useState('recent');
  const [menuOpen,   setMenuOpen]   = useState(null);
  const [toast,      setToast]      = useState('');

  const showToast = useCallback(msg => { setToast(msg); setTimeout(() => setToast(''), 2800); }, []);

  // Triggers from mobile nav
  useEffect(() => { if (triggerImport) { setShowImport(true); setTriggerImport(false); } }, [triggerImport]);
  useEffect(() => { if (triggerAdd)    { setEditCourse(null); setShowAdd(true); setTriggerAdd(false); } }, [triggerAdd]);

  // Close card menu on outside click
  useEffect(() => {
    const h = e => { if (!e.target.closest('.card-menu')) setMenuOpen(null); };
    window.addEventListener('click', h);
    return () => window.removeEventListener('click', h);
  }, []);

  const { companies, courses } = data;
  const coMap = useMemo(() => Object.fromEntries(companies.map(c => [c.id, c])), [companies]);
  const visibleCos = useMemo(() => companies.filter(co => courses.some(c => c.companyId === co.id)), [companies, courses]);

  const displayed = useMemo(() => {
    const sq = search.toLowerCase();
    let list = courses.filter(c => {
      const matchCo = filterCompany === 'all' || c.companyId === filterCompany;
      const matchQ  = !sq || c.title.toLowerCase().includes(sq);
      return matchCo && matchQ;
    });
    if (sortBy === 'az')       list = [...list].sort((a,b) => a.title.localeCompare(b.title));
    if (sortBy === 'progress') list = list.filter(c => pct(c) === 100);
    if (sortBy === 'recent')   list = [...list].sort((a,b) => (b.lastAccessed||0) - (a.lastAccessed||0));
    return list;
  }, [courses, filterCompany, search, sortBy]);

  // AddCourseModal save handler
  const handleSaveCourse = useCallback((courseData, addCompany, deleteCompanyId, selectCompanyId) => {
    let { companies: cos, courses: crs } = data;

    if (deleteCompanyId) {
      cos = cos.filter(c => c.id !== deleteCompanyId);
      onUpdate({ ...data, companies: cos });
      return;
    }
    if (addCompany) {
      cos = [...cos, addCompany];
      onUpdate({ ...data, companies: cos });
      return;
    }
    if (courseData) {
      crs = editCourse
        ? crs.map(c => c.id === editCourse.id ? { ...c, ...courseData } : c)
        : [...crs, { id: uid(), ...courseData, chapters: [], createdAt: Date.now() }];
      onUpdate({ ...data, courses: crs, companies: cos });
      setShowAdd(false);
      setEditCourse(null);
    }
  }, [data, editCourse, onUpdate]);

  const deleteCourse = useCallback((id, e) => {
    e.stopPropagation();
    const c = data.courses.find(x => x.id === id);
    if (!confirm(`Delete "${c?.title}"? This cannot be undone.`)) return;
    const remaining = data.courses.filter(x => x.id !== id);
    const usedCos   = new Set(remaining.map(x => x.companyId).filter(Boolean));
    onUpdate({ ...data, courses: remaining, companies: data.companies.filter(co => usedCos.has(co.id)) });
  }, [data, onUpdate]);

  const doExport = useCallback(() => {
    downloadJson({ companies, courses }, `courseflow-backup-${new Date().toISOString().slice(0,10)}.json`);
    showToast('✓ Backup downloaded');
  }, [companies, courses]);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="topbar">
        <span className="topbar-title">Course<span>Flow</span></span>
        <div className="si-wrap">
          <span className="si-ico">🔍</span>
          <input className="fi si" placeholder="Search courses…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:210}} />
        </div>
        <button className="btn btn-s btn-sm dsk" onClick={() => setShowImport(true)}>📥 Import</button>
        <button className="btn btn-s btn-sm dsk" onClick={doExport}>💾 Export</button>
        <button className="btn btn-p dsk" onClick={() => { setEditCourse(null); setShowAdd(true); }}>+ Add Course</button>
      </div>

      <div className="content">
        {visibleCos.length > 0 && (
          <div className="chips">
            <div className={`chip ${filterCompany==='all'?'on':''}`} onClick={() => setFilterCompany('all')}>
              ⬡ All ({courses.length})
            </div>
            {visibleCos.map(co => (
              <div key={co.id} className={`chip ${filterCompany===co.id?'on':''}`}
                onClick={() => setFilterCompany(filterCompany === co.id ? 'all' : co.id)}>
                <CompanyIcon company={co} size={16} /> {co.name} ({courses.filter(c=>c.companyId===co.id).length})
              </div>
            ))}
          </div>
        )}

        <div className="sh">
          <div>
            <span className="st">{filterCompany==='all' ? 'All Courses' : (coMap[filterCompany]?.name || 'Courses')}</span>
            <span className="sc">{displayed.length} course{displayed.length!==1?'s':''}</span>
          </div>
          <div className="sort-row">
            {SORTS.map(s => (
              <button key={s.k} className={`sk ${sortBy===s.k?'on':''}`} onClick={() => setSortBy(s.k)}>{s.l}</button>
            ))}
          </div>
        </div>

        {displayed.length === 0 ? (
          <div className="es">
            <div className="es-ico">📚</div>
            <div className="es-t">{courses.length === 0 ? 'No courses yet' : 'No courses found'}</div>
            <div className="es-s">{courses.length === 0 ? 'Start by adding your first course.' : 'Try adjusting your search or filter.'}</div>
            {courses.length === 0 && <button className="btn btn-p" onClick={() => setShowAdd(true)}>Add Your First Course</button>}
          </div>
        ) : (
          <div className="grid">
            {displayed.map((course, i) => {
              const company  = coMap[course.companyId];
              const rIdx     = resumeMap[course.id] ?? 0;
              const hasRes   = Object.prototype.hasOwnProperty.call(resumeMap, course.id);
              const chapters = course.chapters || [];
              const resumeName = chapters[rIdx]?.name;
              return (
                <div key={course.id} className="card" onClick={() => onOpenCourse(course.id)}>
                  {/* Menu */}
                  <div className="card-menu" style={{position:'absolute',top:8,left:8,zIndex:50}}
                    onClick={e => e.stopPropagation()}>
                    <div className="ib" style={{fontSize:10,letterSpacing:2}}
                      onClick={() => setMenuOpen(menuOpen === course.id ? null : course.id)}>•••</div>
                    {menuOpen === course.id && (
                      <div style={{position:'absolute',top:34,left:0,background:'var(--bgc)',border:'1px solid var(--bdl)',borderRadius:10,padding:6,display:'flex',flexDirection:'column',gap:4,minWidth:130,boxShadow:'0 10px 30px rgba(0,0,0,.5)',zIndex:100}}>
                        <div style={{padding:'6px 10px',cursor:'pointer',borderRadius:6,fontSize:13}}
                          onClick={() => { setEditCourse(course); setShowAdd(true); setMenuOpen(null); }}>✏️ Edit</div>
                        <div style={{padding:'6px 10px',cursor:'pointer',borderRadius:6,color:'var(--red)',fontSize:13}}
                          onClick={e => { deleteCourse(course.id, e); setMenuOpen(null); }}>🗑️ Delete</div>
                      </div>
                    )}
                  </div>
                  {/* Thumbnail */}
                  {course.thumbnail ? (
                    <div className="c-thumb">
                      <img src={course.thumbnail} alt={course.title} loading="lazy"
                        onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                      <div style={{display:'none'}} className={`c-ph g${i%6}`}>📖</div>
                      {company && <div className="c-badge"><CompanyIcon company={company} size={18} /></div>}
                      {hasRes  && <div className="c-resume">▶ Resume</div>}
                    </div>
                  ) : (
                    <div className={`c-ph g${i%6}`}>
                      <span>📖</span>
                      {company && <div className="c-badge"><CompanyIcon company={company} size={18} /></div>}
                      {hasRes  && <div className="c-resume">▶ Resume</div>}
                    </div>
                  )}
                  {/* Body */}
                  <div className="c-body">
                    <div className="c-name">{course.title}</div>
                    {hasRes && resumeName
                      ? <div className="c-desc" style={{color:'var(--ac)',opacity:.9}}>▶ Continue: {resumeName}</div>
                      : course.description && <div className="c-desc">{course.description}</div>
                    }
                    <ProgBar done={chapters.filter(c=>c.completed).length} total={chapters.length} />
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {showAdd && (
        <AddCourseModal
          companies={companies} courses={courses} editCourse={editCourse}
          onClose={() => { setShowAdd(false); setEditCourse(null); }}
          onSave={handleSaveCourse}
        />
      )}

      {showImport && (
        <ImportModal
          data={data}
          onClose={() => setShowImport(false)}
          onImport={(newData, msg) => { onUpdate(newData); setShowImport(false); showToast(msg); }}
        />
      )}

      <Toast msg={toast} />
    </div>
  );
}

// ─────────────────────────────────────────────
// CoursePage
// ─────────────────────────────────────────────
function CoursePage({ courseId, data, onUpdate, onBack, resumeMap, onResumeUpdate, mobileNotesOpen, setMobileNotesOpen, initChapterIdx }) {
  const course  = useMemo(() => data.courses.find(c => c.id === courseId), [data.courses, courseId]);
  const company = useMemo(() => data.companies.find(c => c.id === course?.companyId), [data.companies, course?.companyId]);
  const chapters = course?.chapters || [];

  const [activeIdx,  setActiveIdxRaw] = useState(initChapterIdx ?? 0);
  const [videoKey,   setVideoKey]     = useState(0);
  const [showNotes,  setShowNotes]    = useState(false);
  const [showModal,  setShowModal]    = useState(false);
  const [editIdx,    setEditIdx]      = useState(null);
  const [noteSaved,  setNoteSaved]    = useState(false);
  const [popAnim,    setPopAnim]      = useState(false);
  const noteSaveTimer = useRef(null);

  // Sync when parent changes chapter (e.g. from Notes page)
  useEffect(() => {
    if (initChapterIdx !== undefined && initChapterIdx !== activeIdx) {
      setActiveIdxRaw(initChapterIdx);
      setVideoKey(k => k + 1);
    }
  }, [initChapterIdx]);

  if (!course) return null;
  const chapter    = chapters[activeIdx];
  const doneCount  = chapters.filter(c => c.completed).length;

  const updateCourse = useCallback(updated => {
    onUpdate({ ...data, courses: data.courses.map(c => c.id === courseId ? updated : c) });
  }, [data, courseId, onUpdate]);

  // Navigate to a chapter — update resume map
  const goToChapter = useCallback(idx => {
    setActiveIdxRaw(idx);
    setVideoKey(k => k + 1);
    const newMap = { ...resumeMap, [courseId]: idx };
    onResumeUpdate(newMap);
  }, [resumeMap, courseId, onResumeUpdate]);

  const markComplete = useCallback((force) => {
    const will = force !== undefined ? force : !chapter?.completed;
    updateCourse({ ...course, chapters: chapters.map((c,i) => i===activeIdx ? {...c,completed:will} : c) });
    if (will) { haptic('medium'); setPopAnim(true); setTimeout(() => setPopAnim(false), 400); }
    else haptic('light');
  }, [chapter, chapters, activeIdx, course, updateCourse]);

  const saveNote = useCallback(val => {
    updateCourse({ ...course, chapters: chapters.map((c,i) => i===activeIdx ? {...c,notes:val} : c) });
    setNoteSaved(false);
    clearTimeout(noteSaveTimer.current);
    noteSaveTimer.current = setTimeout(() => setNoteSaved(true), 500);
  }, [chapters, activeIdx, course, updateCourse]);

  useEffect(() => () => clearTimeout(noteSaveTimer.current), []);

  const saveChapter = useCallback(chData => {
    if (editIdx !== null) {
      updateCourse({ ...course, chapters: chapters.map((c,i) => i===editIdx ? {...c,...chData} : c) });
    } else {
      const nc = [...chapters, { id: uid(), ...chData, completed: false, notes: '' }];
      updateCourse({ ...course, chapters: nc });
      goToChapter(nc.length - 1);
    }
    setShowModal(false); setEditIdx(null);
  }, [chapters, editIdx, course, updateCourse, goToChapter]);

  const deleteChapter = useCallback(idx => {
    if (!confirm('Delete this chapter?')) return;
    const nc = chapters.filter((_,i) => i !== idx);
    updateCourse({ ...course, chapters: nc });
    if (activeIdx >= nc.length) goToChapter(Math.max(0, nc.length - 1));
  }, [chapters, activeIdx, course, updateCourse, goToChapter]);

  const NotesContent = (
    <>
      <div className="np-hd">
        <span className="np-lbl">📓 Notes</span>
        <span style={{fontSize:11,color:'var(--tm)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:120}}>{chapter?.name}</span>
      </div>
      <div className="na">
        <textarea className="nta"
          placeholder={`Notes for "${chapter?.name || 'this chapter'}"…\n\nKey points, questions, code snippets.`}
          value={chapter?.notes || ''}
          onChange={e => saveNote(e.target.value)} />
        <div className="nsv">{noteSaved ? '✓ Saved' : ''}</div>
      </div>
    </>
  );

  return (
    <div className="cp" style={{height:'100%'}}>
      {/* ── Sidebar chapter list (desktop) ── */}
      <div className="ci">
        <div className="ci-hd">
          <button className="btn btn-s btn-sm" onClick={onBack} style={{marginBottom:10}}>← Back</button>
          <div className="ci-lbl">Course Index</div>
          <div className="ci-ttl">{course.title}</div>
          <ProgBar done={doneCount} total={chapters.length} compact />
        </div>
        <div className="ci-list">
          <ChapterList chapters={chapters} activeIdx={activeIdx}
            onSelect={goToChapter} onEdit={i=>{setEditIdx(i);setShowModal(true);}} onDelete={deleteChapter} />
        </div>
        <div className="ci-add">
          <button className="btn btn-s" style={{width:'100%',justifyContent:'center'}}
            onClick={() => { setEditIdx(null); setShowModal(true); }}>+ Add Chapter</button>
        </div>
      </div>

      {/* ── Main content ── */}
      <div className="cm2">
        <div className="ctb">
          {company && <CompanyIcon company={company} size={22} />}
          <div className="cttl">{chapter?.name || 'Select a chapter'}</div>
          {chapter && (
            <div className="cbtn" onClick={() => markComplete()}>
              <div className={`chk ${chapter.completed?'on':''} ${popAnim?'pop':''}`}>
                {chapter.completed ? '✓' : ''}
              </div>
              <span style={{fontSize:13,color:chapter.completed?'var(--ac)':'var(--t2)',fontWeight:600,whiteSpace:'nowrap'}}>
                {chapter.completed ? 'Completed' : 'Mark Complete'}
              </span>
            </div>
          )}
          <button className="btn btn-s btn-sm dsk" onClick={() => setShowNotes(v => !v)}>
            {showNotes ? '⊟ Hide Notes' : '⊞ Notes'}
          </button>
        </div>

        <div className="cca">
          <div className="cv">
            {!chapter ? (
              <div className="es" style={{padding:'60px 20px'}}>
                <div className="es-ico">📖</div>
                <div className="es-t">No chapters yet</div>
                <div className="es-s">Add chapters to start building your course content.</div>
                <button className="btn btn-p" onClick={() => setShowModal(true)}>Add First Chapter</button>
              </div>
            ) : (
              <>
                {chapter.type === 'video' && (
                  chapter.videoUrl
                    ? <VideoPlayer url={chapter.videoUrl} videoKey={`${courseId}-${activeIdx}-${videoKey}`}
                        onEnded={() => { if (!chapter.completed) markComplete(true); }} />
                    : <div className="vno-url">
                        <span style={{fontSize:36}}>▶</span>
                        <span>No video URL set</span>
                        <button className="btn btn-s btn-sm" onClick={() => { setEditIdx(activeIdx); setShowModal(true); }}>Add Video URL</button>
                      </div>
                )}
                {chapter.description && (
                  <div className="ds">
                    <div className="ds-t">📋 Description</div>
                    <div className="ds-p">{chapter.description}</div>
                  </div>
                )}
                {chapter.links?.length > 0 && (
                  <div className="ds">
                    <div className="ds-t">🔗 Resources</div>
                    <div className="ll">
                      {chapter.links.map((l,i) => {
                        const lk = typeof l === 'string' ? {label:l,url:l} : l;
                        return <a key={i} href={lk.url} target="_blank" rel="noopener noreferrer" className="li">🔗 {lk.label || lk.url}</a>;
                      })}
                    </div>
                  </div>
                )}
                {chapter.files?.length > 0 && (
                  <div className="ds">
                    <div className="ds-t">📁 Files</div>
                    <div className="fl2">
                      {chapter.files.map((f,i) => {
                        const fi = typeof f === 'string' ? {name:f,url:''} : f;
                        return (
                          <a key={i} href={fi.url||'#'} target="_blank" rel="noopener noreferrer" className="fi2"
                            style={{cursor:fi.url?'pointer':'default'}}>
                            <span style={{fontSize:18}}>📄</span>
                            <span className="fi2-n">{fi.name || fi.url}</span>
                          </a>
                        );
                      })}
                    </div>
                  </div>
                )}
                {!chapter.description && !chapter.links?.length && !chapter.files?.length && chapter.type === 'text' && (
                  <div className="ds" style={{textAlign:'center',padding:'40px 20px',color:'var(--tm)'}}>
                    <div style={{fontSize:32,marginBottom:10}}>📝</div>
                    <div>No content yet.</div>
                    <button className="btn btn-s btn-sm" style={{marginTop:12}}
                      onClick={() => { setEditIdx(activeIdx); setShowModal(true); }}>Add Content</button>
                  </div>
                )}
              </>
            )}
          </div>

          {/* Desktop notes panel */}
          <div className={`np ${showNotes ? '' : 'hide'}`}>
            {showNotes && NotesContent}
          </div>
        </div>
      </div>

      {/* Mobile notes sheet */}
      <div className={`mns ${mobileNotesOpen ? 'open' : ''}`}>
        <div className="mns-bk" onClick={() => setMobileNotesOpen(false)} />
        <div className="mns-pn">
          <div className="mns-hnd" />
          <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
            {NotesContent}
          </div>
        </div>
      </div>

      {showModal && (
        <ChapterModal
          chapter={editIdx !== null ? chapters[editIdx] : null}
          onClose={() => { setShowModal(false); setEditIdx(null); }}
          onSave={saveChapter}
        />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// MobileSidebarIndex (chapter list drawer)
// ─────────────────────────────────────────────
function MobileSidebarIndex({ courseId, data, onUpdate, onClose, activeChapterIdx, onSelectChapter }) {
  const course = useMemo(() => data.courses.find(c => c.id === courseId), [data.courses, courseId]);
  const [showModal, setShowModal] = useState(false);
  const [editIdx,   setEditIdx]   = useState(null);
  if (!course) return null;

  const chapters = course.chapters || [];
  const done = chapters.filter(c => c.completed).length;

  const update = updated => onUpdate({ ...data, courses: data.courses.map(c => c.id === courseId ? updated : c) });

  const saveChapter = chData => {
    const isEdit = editIdx !== null;
    const nc = isEdit
      ? chapters.map((c,i) => i===editIdx ? {...c,...chData} : c)
      : [...chapters, { id: uid(), ...chData, completed: false, notes: '' }];
    update({ ...course, chapters: nc });
    if (!isEdit) onSelectChapter(nc.length - 1);
    setShowModal(false); setEditIdx(null);
  };

  const deleteChapter = idx => {
    if (!confirm('Delete this chapter?')) return;
    update({ ...course, chapters: chapters.filter((_,i) => i !== idx) });
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="ci-hd" style={{padding:'14px 16px'}}>
        <button className="btn btn-s btn-sm" onClick={onClose} style={{marginBottom:10}}>× Close</button>
        <div className="ci-lbl">Course Index</div>
        <div className="ci-ttl">{course.title}</div>
        <ProgBar done={done} total={chapters.length} compact />
      </div>
      <div className="ci-list" style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        <ChapterList chapters={chapters} activeIdx={activeChapterIdx}
          onSelect={i => { onSelectChapter(i); onClose(); }}
          onEdit={i => { setEditIdx(i); setShowModal(true); }}
          onDelete={deleteChapter} mobile />
      </div>
      <div className="ci-add">
        <button className="btn btn-s" style={{width:'100%',justifyContent:'center'}}
          onClick={() => { setEditIdx(null); setShowModal(true); }}>+ Add Chapter</button>
      </div>
      {showModal && (
        <ChapterModal
          chapter={editIdx !== null ? chapters[editIdx] : null}
          onClose={() => { setShowModal(false); setEditIdx(null); }}
          onSave={saveChapter}
        />
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// LoginScreen — renders into #root directly,
// never shares a React tree with App
// ─────────────────────────────────────────────
function LoginScreen() {
  const [pw, setPw]           = useState('');
  const [err, setErr]         = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    if (!pw.trim()) return;
    setLoading(true); setErr('');
    try {
      if (!FIREBASE_CONFIGURED) {
        // No Firebase — just store pw and boot App
        localStorage.setItem('cf_session_pw', pw);
        bootApp(pw, loadData(), loadResume());
        return;
      }

      // Verify password via sentinel doc
      const db = getDb();
      let sentinelSnap;
      try {
        sentinelSnap = await db.collection('courseflow').doc('sentinel').get();
      } catch(e) {
        const msg = e.message || String(e);
        if (msg.includes('ermission')) setErr('Firebase permissions error. Set Firestore rules to: allow read, write: if true;');
        else if (msg.includes('roject') || msg.includes('NOT_FOUND')) setErr('Firebase project not found. Check your projectId.');
        else setErr('Firebase error: ' + msg);
        setLoading(false); return;
      }

      if (sentinelSnap.exists) {
        try { await decryptData(sentinelSnap.data().data, pw); }
        catch(e) { setErr('Wrong password. Try again.'); setLoading(false); return; }
      }

      // Load cloud data
      const [cloudData, cloudResume] = await Promise.all([
        cloudLoad('data',   pw),
        cloudLoad('resume', pw),
      ]);

      // First time — write sentinel
      if (!sentinelSnap.exists) await cloudSave('sentinel', { ok: true }, pw);

      const finalData   = cloudData   ?? loadData();
      const finalResume = cloudResume ?? loadResume();

      // Persist to localStorage so App can read synchronously on mount
      localStorage.setItem('cf_session_pw', pw);
      saveData(finalData);
      saveResume(finalResume);

      // Unmount LoginScreen and mount App — no React state involved
      bootApp(pw, finalData, finalResume);

    } catch(e) {
      setErr('Unexpected error: ' + (e.message || e));
      setLoading(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'var(--bgc)',border:'1px solid var(--bdl)',borderRadius:16,padding:'32px 28px',width:'100%',maxWidth:360,boxShadow:'0 24px 80px rgba(0,0,0,.6)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <div style={{width:40,height:40,background:'var(--ac)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:15,color:'#0a0e1a',flexShrink:0}}>CF</div>
          <div>
            <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:18}}>CourseFlow</div>
            <div style={{fontSize:12,color:'var(--t2)'}}>Enter your password to unlock</div>
          </div>
        </div>
        {!FIREBASE_CONFIGURED && (
          <div style={{background:'rgba(247,144,9,.12)',border:'1px solid rgba(247,144,9,.3)',borderRadius:8,padding:'10px 12px',marginBottom:16,fontSize:12,color:'#f6c90e',lineHeight:1.6}}>
            ⚠️ Firebase not configured. Running in local-only mode.
          </div>
        )}
        <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:12}}>
          <div className="fg">
            <label className="fl">Password</label>
            <input className="fi" type="password" autoFocus placeholder="Your secret password"
              value={pw} onChange={e => setPw(e.target.value)} />
          </div>
          {err && <div style={{fontSize:12,color:'var(--red)',background:'rgba(245,101,101,.1)',border:'1px solid rgba(245,101,101,.25)',borderRadius:6,padding:'8px 10px'}}>{err}</div>}
          <button className="btn btn-p" type="submit" disabled={loading || !pw.trim()} style={{justifyContent:'center',marginTop:4}}>
            {loading ? 'Unlocking…' : 'Unlock'}
          </button>
        </form>
        <div style={{marginTop:16,fontSize:11,color:'var(--tm)',lineHeight:1.6,textAlign:'center'}}>
          AES-256 encrypted before leaving this device.
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// App — only ever mounts after auth is confirmed
// ─────────────────────────────────────────────
function App({ sessionPw, initialData, initialResume }) {
  const [data,      setData]      = useState(initialData);
  const [resumeMap, setResumeMap] = useState(initialResume);
  const [view,      setView]      = useState('home');
  const [filter,    setFilter]    = useState('all');
  const [chapterIdx, setChapterIdx] = useState(0);
  const [syncStatus, setSyncStatus] = useState('');

  const [mobileSidebar, setMobileSidebar] = useState(false);
  const [mobileNotes,   setMobileNotes]   = useState(false);
  const [triggerImport, setTriggerImport] = useState(false);
  const [triggerAdd,    setTriggerAdd]    = useState(false);

  const dataRef      = useRef(data);
  const resumeMapRef = useRef(resumeMap);
  const pwRef        = useRef(sessionPw);
  useEffect(() => { dataRef.current = data; },          [data]);
  useEffect(() => { resumeMapRef.current = resumeMap; }, [resumeMap]);

  // ── Real-time Firestore listeners ──
  // Fires instantly on every device whenever another device saves.
  // We skip applying the update if it originated from this tab
  // (detected by a short "local write in progress" window).
  const localWriting = useRef(false);

  useEffect(() => {
    if (!FIREBASE_CONFIGURED || !sessionPw) return;
    const db = getDb(); if (!db) return;

    const unsub1 = db.collection('courseflow').doc('data').onSnapshot(async snap => {
      if (!snap.exists || localWriting.current) return;
      try {
        const json = await decryptData(snap.data().data, pwRef.current);
        const parsed = JSON.parse(json);
        if (parsed && parsed.courses) {
          setData(parsed);
          saveData(parsed);
        }
      } catch(e) { /* decryption error — ignore */ }
    });

    const unsub2 = db.collection('courseflow').doc('resume').onSnapshot(async snap => {
      if (!snap.exists || localWriting.current) return;
      try {
        const json = await decryptData(snap.data().data, pwRef.current);
        const parsed = JSON.parse(json);
        if (parsed) {
          setResumeMap(parsed);
          saveResume(parsed);
        }
      } catch(e) { /* ignore */ }
    });

    return () => { unsub1(); unsub2(); };
  }, [sessionPw]);

  // Debounced cloud save (marks localWriting so we don't echo our own writes)
  const syncTimer = useRef(null);
  function scheduleSync(newData, newResume) {
    if (!FIREBASE_CONFIGURED || !pwRef.current) return;
    clearTimeout(syncTimer.current);
    setSyncStatus('saving');
    syncTimer.current = setTimeout(async () => {
      localWriting.current = true;
      try {
        await Promise.all([
          cloudSave('data',   newData,   pwRef.current),
          cloudSave('resume', newResume, pwRef.current),
        ]);
        setSyncStatus('saved');
        setTimeout(() => setSyncStatus(''), 2500);
      } catch(e) { setSyncStatus('error'); }
      finally {
        // Keep the flag on briefly so the snapshot echo is suppressed
        setTimeout(() => { localWriting.current = false; }, 2000);
      }
    }, 1200);
  }

  function handleLock() {
    clearTimeout(syncTimer.current);
    localStorage.removeItem('cf_session_pw');
    // Unmount App, mount LoginScreen — no React state flash
    bootLogin();
  }

  const updateData = useCallback(d => {
    setData(d); saveData(d);
    scheduleSync(d, resumeMapRef.current);
  }, []);

  const updateResume = useCallback(m => {
    setResumeMap(m); saveResume(m);
    scheduleSync(dataRef.current, m);
  }, []);

  const goHome = useCallback(() => { setView('home'); setMobileSidebar(false); setMobileNotes(false); }, []);

  const openCourse = useCallback((id, chIdx, fromNotes = false) => {
    const d = dataRef.current;
    const r = resumeMapRef.current;
    const idx = chIdx !== undefined ? chIdx : (r[id] ?? 0);
    setChapterIdx(idx);
    const updated = { ...d, courses: d.courses.map(c => c.id === id ? { ...c, lastAccessed: Date.now() } : c) };
    setData(updated); saveData(updated);
    scheduleSync(updated, r);
    if (!fromNotes) { const nm = { ...r, [id]: idx }; setResumeMap(nm); saveResume(nm); scheduleSync(updated, nm); }
    setView(id);
  }, []);

  const isCourse = view !== 'home' && view !== 'notes';
  const sidebarCos = useMemo(() => data.companies.filter(co => data.courses.some(c => c.companyId === co.id)), [data.companies, data.courses]);
  const activeCo   = useMemo(() => isCourse ? data.courses.find(c => c.id === view)?.companyId : null, [isCourse, data.courses, view]);

  const exportMobile = useCallback(() => {
    const { companies, courses } = dataRef.current;
    downloadJson({ companies, courses }, `courseflow-backup-${new Date().toISOString().slice(0,10)}.json`);
  }, []);

  const syncColor = syncStatus === 'saved' ? 'var(--ac)' : syncStatus === 'error' ? 'var(--red)' : 'var(--tm)';
  const syncLabel = syncStatus === 'saving' ? '↑ Syncing…' : syncStatus === 'saved' ? '✓ Synced' : syncStatus === 'error' ? '✗ Sync error' : FIREBASE_CONFIGURED ? '☁ Cloud sync on' : '⚠ Local only';

  return (
    <div style={{display:'flex',position:'fixed',inset:0,overflow:'hidden'}}>
      <div className="sb">
        <div className="sb-logo" onClick={goHome} title="CourseFlow">CF</div>
        <div className="sb-div" />
        <div className={`sb-item ${view==='home'&&filter==='all'?'on':''}`} onClick={() => { setView('home'); setFilter('all'); }}>
          <span style={{fontSize:18}}>⬡</span><span className="sb-tip">All Courses</span>
        </div>
        <div className={`sb-item ${view==='notes'?'on':''}`} onClick={() => setView('notes')}>
          <span style={{fontSize:18}}>📓</span><span className="sb-tip">My Notes</span>
        </div>
        <div className="sb-div" />
        {sidebarCos.map(co => (
          <div key={co.id}
            className={`sb-item ${activeCo===co.id || (view==='home'&&filter===co.id) ? 'on' : ''}`}
            onClick={() => { setView('home'); setFilter(co.id); }}>
            <CompanyIcon company={co} size={26} />
            <span className="sb-tip">{co.name}</span>
          </div>
        ))}
        <div style={{flex:1}} />
        <div style={{fontSize:9,color:syncColor,textAlign:'center',padding:'4px',lineHeight:1.4,cursor:'default'}} title={syncLabel}>
          {syncStatus==='saving'?'↑':syncStatus==='saved'?'✓':syncStatus==='error'?'✗':FIREBASE_CONFIGURED?'☁':'⚠'}
        </div>
        <div className="sb-item" onClick={handleLock} title="Lock" style={{marginBottom:8}}>
          <span style={{fontSize:16}}>🔒</span><span className="sb-tip">Lock</span>
        </div>
      </div>

      <div className="main">
        {view === 'home' && (
          <HomePage data={data} onUpdate={updateData} onOpenCourse={openCourse}
            filterCompany={filter} setFilterCompany={setFilter} resumeMap={resumeMap}
            triggerImport={triggerImport} setTriggerImport={setTriggerImport}
            triggerAdd={triggerAdd} setTriggerAdd={setTriggerAdd} />
        )}
        {view === 'notes' && <GlobalNotesPage data={data} onOpenCourse={openCourse} />}
        {isCourse && (
          <CoursePage courseId={view} data={data} onUpdate={updateData} onBack={goHome}
            resumeMap={resumeMap} onResumeUpdate={updateResume}
            mobileNotesOpen={mobileNotes} setMobileNotesOpen={setMobileNotes}
            initChapterIdx={chapterIdx} />
        )}
      </div>

      <nav className="mbn">
        {isCourse ? (
          <>
            <button className="mni" onClick={goHome}><span className="mni-i">←</span><span>Home</span></button>
            <button className={`mni ${mobileSidebar?'on':''}`} onClick={() => setMobileSidebar(true)}><span className="mni-i">☰</span><span>Chapters</span></button>
            <button className={`mni ${mobileNotes?'on':''}`} onClick={() => setMobileNotes(v => !v)}><span className="mni-i">📓</span><span>{mobileNotes?'Hide':'Notes'}</span></button>
            <button className="mni" onClick={handleLock}><span className="mni-i">🔒</span><span>Lock</span></button>
          </>
        ) : (
          <>
            <button className={`mni ${view==='home'?'on':''}`} onClick={goHome}><span className="mni-i">⬡</span><span>Courses</span></button>
            <button className={`mni ${view==='notes'?'on':''}`} onClick={() => setView('notes')}><span className="mni-i">📓</span><span>Notes</span></button>
            <button className="mni" onClick={() => setTriggerAdd(true)}><span className="mni-i">＋</span><span>Add</span></button>
            <button className="mni" onClick={() => setTriggerImport(true)}><span className="mni-i">📥</span><span>Import</span></button>
            <button className="mni" onClick={exportMobile}><span className="mni-i">💾</span><span style={{color:syncColor}}>{syncStatus==='saving'?'Sync…':syncStatus==='saved'?'Synced':syncStatus==='error'?'Err':'Export'}</span></button>
            <button className="mni" onClick={handleLock}><span className="mni-i">🔒</span><span>Lock</span></button>
          </>
        )}
      </nav>

      <div className={`mss ${mobileSidebar ? 'open' : ''}`}>
        <div className="mss-bk" onClick={() => setMobileSidebar(false)} />
        <div className="mss-pn" onClick={e => e.stopPropagation()}>
          {isCourse && (
            <MobileSidebarIndex courseId={view} data={data} onUpdate={updateData}
              onClose={() => setMobileSidebar(false)}
              activeChapterIdx={chapterIdx}
              onSelectChapter={idx => { setChapterIdx(idx); setMobileSidebar(false); }} />
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// Boot helpers — swap LoginScreen ↔ App by
// calling ReactDOM.render on the same root.
// No shared React tree = no blank flash ever.
// ─────────────────────────────────────────────
const _root = ReactDOM.createRoot(document.getElementById('root'));

function bootLogin() {
  _root.render(<LoginScreen />);
}

function bootApp(pw, data, resume) {
  _root.render(<App sessionPw={pw} initialData={data} initialResume={resume} />);
}

// On page load: if a session exists go straight to App, else show login
const _savedPw = localStorage.getItem('cf_session_pw');
if (_savedPw) {
  bootApp(_savedPw, loadData(), loadResume());
} else {
  bootLogin();
}
</script>
</body>
</html>
