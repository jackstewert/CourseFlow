<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<title>CourseFlow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" onerror="window._RE=1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" onerror="window._RE=1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" onerror="window._BE=1"></script>
<script>
(function(){
  document.addEventListener('DOMContentLoaded', function(){
    var r = document.getElementById('root');
    if (r && !r.hasChildNodes())
      r.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;font-family:sans-serif;color:#10e68c;background:#0a0e1a"><div style="width:40px;height:40px;background:#10e68c;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#0a0e1a">CF</div><div style="color:#e8edf5;font-size:16px;font-weight:600">Loading CourseFlow\u2026</div></div>';
  });
  window.addEventListener('load', function(){
    if (!window._RE && !window._BE && window.React && window.ReactDOM && window.Babel) return;
    var q = [];
    if (!window.React)   q.push('https://unpkg.com/react@18.2.0/umd/react.production.min.js');
    if (!window.ReactDOM)q.push('https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js');
    if (!window.Babel)   q.push('https://unpkg.com/@babel/standalone@7.23.2/babel.min.js');
    (function run(i){
      if (i >= q.length) { try { Babel.transformScriptTags(); } catch(e){} return; }
      var s = document.createElement('script'); s.src = q[i];
      s.onload = function(){ run(i+1); };
      s.onerror = function(){
        document.getElementById('root').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;padding:24px;text-align:center;font-family:sans-serif;background:#0a0e1a"><div style="font-size:36px">\u26a0\ufe0f</div><div style="color:#e8edf5;font-size:16px;font-weight:700">Could not load CourseFlow</div><button onclick="location.reload()" style="margin-top:8px;padding:10px 20px;background:#10e68c;color:#0a0e1a;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Retry</button></div>';
      };
      document.head.appendChild(s);
    })(0);
  });
})();
</script>

<style>
:root {
  --bg:    #0a0e1a; --bg2: #111827; --bgc: #161d2e; --bgh: #1e2740; --bgs: #0d1220;
  --ac:    #10e68c; --acd: #0bbf76; --acg: rgba(16,230,140,.15); --ac2: #4f8ef7;
  --t1:    #e8edf5; --t2:  #8b95a8; --tm: #4a5568;
  --bd:    #1e2d45; --bdl: #263548;
  --red:   #f56565; --pur: #a78bfa;
  --r:     10px;    --rl:  16px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'DM Sans', system-ui, sans-serif;
  background:var(--bg); color:var(--t1);
  -webkit-text-size-adjust:100%;
  position:fixed; inset:0;
}
#root { display:flex; position:fixed; inset:0; overflow:hidden; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bdl); border-radius:4px; }

.sb { width:68px; background:var(--bgs); border-right:1px solid var(--bd); display:flex; flex-direction:column; align-items:center; padding:16px 0; gap:6px; flex-shrink:0; z-index:10; overflow-y:auto; overflow-x:hidden; }
.sb-logo { width:40px; height:40px; background:var(--ac); border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:12px; font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:#0a0e1a; cursor:pointer; flex-shrink:0; }
.sb-div  { width:32px; height:1px; background:var(--bd); margin:6px 0; flex-shrink:0; }
.sb-item { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s,border-color .15s; position:relative; flex-shrink:0; border:2px solid transparent; }
.sb-item:hover  { background:var(--bgh); }
.sb-item.on     { background:var(--acg); border-color:var(--ac); }
.sb-tip { position:absolute; left:56px; background:#1e2740; color:var(--t1); font-size:12px; padding:4px 10px; border-radius:6px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; border:1px solid var(--bdl); z-index:100; }
.sb-item:hover .sb-tip { opacity:1; }
.fp { width:26px; height:26px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { height:60px; background:var(--bg2); border-bottom:1px solid var(--bd); display:flex; align-items:center; padding:0 24px; gap:12px; flex-shrink:0; padding-top:env(safe-area-inset-top,0); }
.topbar-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; flex:1; }
.topbar-title span { color:var(--ac); }
.content { flex:1; overflow-y:auto; padding:28px; -webkit-overflow-scrolling:touch; }

.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:background .12s,transform .12s; font-family:inherit; }
.btn-p  { background:var(--ac);  color:#0a0e1a; }
.btn-p:hover { background:var(--acd); transform:translateY(-1px); }
.btn-s  { background:transparent; color:var(--t2); border:1px solid var(--bdl); }
.btn-s:hover { background:var(--bgh); color:var(--t1); }
.btn-d  { background:transparent; color:var(--red); border:1px solid rgba(245,101,101,.3); }
.btn-d:hover { background:rgba(245,101,101,.1); }
.btn-sm { padding:5px 12px; font-size:12px; }
.ib { width:28px; height:28px; border-radius:6px; background:rgba(10,14,26,.7); border:1px solid var(--bd); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px; transition:background .12s; }
.ib:hover { background:var(--bgh); }
.xb { width:28px; height:28px; border-radius:6px; background:transparent; border:none; color:var(--t2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:background .12s; }
.xb:hover { background:var(--bgh); color:var(--t1); }

.fg { display:flex; flex-direction:column; gap:6px; }
.fl { font-size:12px; font-weight:600; color:var(--t2); letter-spacing:.04em; text-transform:uppercase; }
.fi, .fta, .fsel {
  background:var(--bg2); border:1px solid var(--bdl); border-radius:8px;
  color:var(--t1); font-family:inherit; font-size:16px; padding:10px 12px;
  outline:none; transition:border-color .12s; width:100%; -webkit-appearance:none; appearance:none;
}
.fi:focus, .fta:focus, .fsel:focus { border-color:var(--ac); }
.fta { resize:vertical; min-height:80px; }
.fsel { cursor:pointer; }
.si-wrap { position:relative; }
.si { padding-left:34px !important; }
.si-ico { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--tm); font-size:14px; pointer-events:none; }

.mbk { position:fixed; inset:0; background:rgba(0,0,0,.72); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.mo  { background:var(--bgc); border-radius:var(--rl); border:1px solid var(--bdl); width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 80px rgba(0,0,0,.6); }
.mh  { padding:20px 24px 16px; border-bottom:1px solid var(--bd); display:flex; align-items:center; justify-content:space-between; }
.mt  { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; }
.mb  { padding:20px 24px; display:flex; flex-direction:column; gap:16px; }
.mf  { padding:16px 24px; border-top:1px solid var(--bd); display:flex; justify-content:flex-end; gap:10px; }

.tabs { display:flex; gap:2px; background:var(--bg2); border-radius:8px; padding:3px; }
.tabk { padding:6px 14px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:transparent; color:var(--t2); transition:background .12s,color .12s; }
.tabk.on { background:var(--bgc); color:var(--t1); }

.sh  { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.st  { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
.sc  { font-size:13px; color:var(--t2); margin-left:8px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:20px; }

.card { background:var(--bgc); border-radius:var(--rl); overflow:hidden; cursor:pointer; border:1px solid var(--bd); transition:border-color .15s,transform .15s,box-shadow .15s; position:relative; }
.card:hover { border-color:var(--bdl); transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,.4); }
.c-thumb { width:100%; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.c-thumb img { width:100%; height:100%; object-fit:cover; }
.c-ph { width:100%; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; font-size:36px; position:relative; overflow:hidden; }
.c-badge { position:absolute; bottom:8px; right:8px; width:28px; height:28px; border-radius:6px; background:rgba(10,14,26,.8); border:1px solid var(--bd); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.c-resume{ position:absolute; bottom:8px; left:8px; background:rgba(16,230,140,.92); color:#0a0e1a; font-size:10px; font-weight:800; padding:3px 8px; border-radius:5px; letter-spacing:.04em; }
.c-body  { padding:14px 16px 16px; }
.c-name  { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin-bottom:5px; line-height:1.3; }
.c-desc  { font-size:12.5px; color:var(--t2); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:12px; }
.pw { margin-top:4px; }
.pl { display:flex; justify-content:space-between; font-size:11px; color:var(--tm); margin-bottom:5px; }
.pb { height:3px; background:var(--bd); border-radius:10px; overflow:hidden; }
.pf { height:100%; background:var(--ac); border-radius:10px; transition:width .3s; }

.sort-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.sk { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--bdl); background:transparent; color:var(--t2); transition:all .12s; font-family:inherit; }
.sk.on { border-color:var(--ac); color:var(--ac); background:var(--acg); }
.sk:hover:not(.on) { background:var(--bgh); color:var(--t1); }

.chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
.chip { display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; cursor:pointer; border:1.5px solid var(--bd); background:var(--bgc); font-size:12.5px; font-weight:600; transition:all .12s; }
.chip:hover { border-color:var(--bdl); background:var(--bgh); }
.chip.on { border-color:var(--ac); background:var(--acg); color:var(--ac); }

.es { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; text-align:center; gap:16px; }
.es-ico { font-size:56px; opacity:.3; }
.es-t   { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--t2); }
.es-s   { font-size:14px; color:var(--tm); max-width:300px; line-height:1.6; }

.cp { display:flex; height:100%; overflow:hidden; }

.ci { width:280px; flex-shrink:0; background:var(--bgs); border-right:1px solid var(--bd); display:flex; flex-direction:column; overflow:hidden; }
.ci-hd { padding:16px; border-bottom:1px solid var(--bd); }
.ci-lbl { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--t2); margin-bottom:10px; }
.ci-ttl { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; line-height:1.4; }
.ci-list { flex:1; overflow-y:auto; padding:10px 0; -webkit-overflow-scrolling:touch; }
.modh { padding:20px 16px 6px; display:flex; align-items:center; justify-content:space-between; }
.modlbl { font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--tm); }

.cr { display:flex; align-items:center; gap:12px; padding:11px 14px 11px 20px; cursor:pointer; transition:background .1s; border-left:3px solid transparent; }
.cr:hover { background:var(--bgh); }
.cr.on { background:var(--acg); border-left-color:var(--ac); }
.cr.dn .cn { background:var(--acd); border-color:var(--acd); color:#0a0e1a; }
.cn { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.05); border:1.5px solid var(--bdl); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; color:var(--t2); transition:all .12s; }
.cr.on .cn { background:var(--ac); border-color:var(--ac); color:#0a0e1a; }
.ci2 { flex:1; min-width:0; }
.cn2 { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--t2); line-height:1.3; }
.cr.on .cn2 { color:var(--t1); }
.cm { display:flex; align-items:center; gap:6px; margin-top:3px; }
.cbv { font-size:9px; padding:2px 6px; border-radius:4px; font-weight:800; letter-spacing:.04em; }
.bv { background:rgba(79,142,247,.18); color:var(--ac2); }
.bt { background:rgba(167,139,250,.18); color:var(--pur); }
.cd { font-size:10.5px; color:var(--tm); }
.cr-acts { display:flex; gap:4px; opacity:0; transition:opacity .1s; flex-shrink:0; }
.cr:hover .cr-acts { opacity:1; }
.acr { padding:10px 16px; border-top:1px solid var(--bd); flex-shrink:0; }

.cm2 { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.ctb { height:56px; background:var(--bg2); border-bottom:1px solid var(--bd); display:flex; align-items:center; padding:0 20px; gap:12px; flex-shrink:0; }
.cttl { flex:1; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; }
.cca { flex:1; display:flex; overflow:hidden; }
.cv  { flex:1; overflow-y:auto; padding:24px; -webkit-overflow-scrolling:touch; }

/* ── Video wrapper & skeleton ─────────────────────────────────────── */
.vw  { width:100%; aspect-ratio:16/9; background:#000; border-radius:var(--rl); overflow:hidden; margin-bottom:20px; position:relative; }
.vw iframe { width:100%; height:100%; border:none; display:block; }

/* Skeleton shimmer shown while iframe is loading */
.vsk {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  background:var(--bgc); border-radius:var(--rl); z-index:2;
  transition:opacity .25s;
}
.vsk.hidden { opacity:0; pointer-events:none; }
.vsk-spin {
  width:40px; height:40px; border-radius:50%;
  border:3px solid var(--bdl); border-top-color:var(--ac);
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.vsk-txt { font-size:13px; color:var(--tm); font-weight:600; }

/* Click-to-load poster for YouTube — avoids early iframe network hit */
.vyt-poster {
  position:absolute; inset:0; cursor:pointer; z-index:3;
  display:flex; align-items:center; justify-content:center;
  background:#000; border-radius:var(--rl); overflow:hidden;
}
.vyt-poster img { width:100%; height:100%; object-fit:cover; }
.vyt-poster-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.35);
  display:flex; align-items:center; justify-content:center;
}
.vyt-play {
  width:64px; height:64px; background:rgba(255,255,255,.95);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  transition:transform .15s, background .15s; box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.vyt-poster:hover .vyt-play { transform:scale(1.1); background:#fff; }
.vyt-play::after { content:''; border-style:solid; border-width:10px 0 10px 20px; border-color:transparent transparent transparent #0a0e1a; margin-left:4px; }

.vph { width:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; background:var(--bgc); border-radius:var(--rl); color:var(--tm); font-size:14px; aspect-ratio:16/9; margin-bottom:20px; border:2px dashed var(--bdl); }

.cbtn { display:flex; align-items:center; gap:6px; cursor:pointer; }
.chk { width:18px; height:18px; border-radius:4px; border:2px solid var(--bdl); display:flex; align-items:center; justify-content:center; transition:all .12s; flex-shrink:0; }
.chk.on { background:var(--ac); border-color:var(--ac); }
.chk.on::after { content:'✓'; font-size:11px; font-weight:700; color:#0a0e1a; }
@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 70%{transform:scale(.92)} 100%{transform:scale(1)} }
.chk.pop { animation:pop .32s ease; }

.ds { background:var(--bgc); border:1px solid var(--bd); border-radius:var(--rl); padding:20px; margin-bottom:20px; }
.ds-t { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; margin-bottom:12px; color:var(--t2); text-transform:uppercase; letter-spacing:.06em; }
.ds-p { font-size:14px; color:var(--t2); line-height:1.7; white-space:pre-wrap; }
.fl2  { display:flex; flex-direction:column; gap:8px; }
.fi2  { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bgh); border-radius:8px; border:1px solid var(--bd); text-decoration:none; color:inherit; }
.fi2-n{ font-size:13px; flex:1; }
.ll  { display:flex; flex-direction:column; gap:6px; }
.li  { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ac2); padding:6px 0; text-decoration:none; }
.li:hover { color:var(--ac); }

.np { width:300px; flex-shrink:0; background:var(--bgc); border-left:1px solid var(--bd); display:flex; flex-direction:column; overflow:hidden; transition:width .18s; }
.np.hide { width:0; }
.np-hd { padding:14px 16px; border-bottom:1px solid var(--bd); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.np-t  { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--t2); }
.na  { flex:1; padding:12px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
.nta { width:100%; flex:1; background:var(--bg2); border:1px solid var(--bdl); border-radius:8px; color:var(--t1); font-family:inherit; font-size:16px; padding:12px; outline:none; resize:none; transition:border-color .12s; min-height:200px; -webkit-appearance:none; }
.nta:focus { border-color:var(--ac); }
.nsv { font-size:11px; color:var(--ac); text-align:right; height:14px; }

.ngl { display:flex; flex-direction:column; gap:14px; }
.nc  { background:var(--bgc); border:1px solid var(--bd); border-radius:var(--rl); padding:16px 18px; cursor:pointer; transition:border-color .12s; }
.nc:hover { border-color:var(--bdl); }
.nc-co { font-size:11px; font-weight:700; color:var(--ac); text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
.nc-ch { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; margin-bottom:8px; }
.nc-pv { font-size:13px; color:var(--t2); line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.nc-pv mark { background:rgba(16,230,140,.22); color:var(--ac); border-radius:2px; padding:0 2px; }

.g0{background:linear-gradient(135deg,#1a2a4a,#0d3d2b)}
.g1{background:linear-gradient(135deg,#2d1a4a,#1a0d3d)}
.g2{background:linear-gradient(135deg,#4a1a1a,#3d0d0d)}
.g3{background:linear-gradient(135deg,#1a4a2d,#0d3d1a)}
.g4{background:linear-gradient(135deg,#4a3a1a,#3d2d0d)}
.g5{background:linear-gradient(135deg,#1a3a4a,#0d2d3d)}

.mbn {
  display:none; position:fixed; bottom:0; left:0; right:0;
  background:var(--bgs); border-top:1px solid var(--bd);
  padding-bottom:max(env(safe-area-inset-bottom),20px);
  z-index:200; flex-direction:row; align-items:stretch;
  min-height:calc(56px + max(env(safe-area-inset-bottom),20px));
}
.mbn::after { content:''; position:absolute; left:0; right:0; top:100%; height:40px; background:var(--bgs); }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const SK  = 'courseflow_v2';
const RK  = 'courseflow_resume';
const GC  = ['#10e68c','#4f8ef7','#f56565','#f6c90e','#a78bfa','#fb923c'];
const EMP = { companies:[], courses:[] };
const SORTS = [
  { k:'added',    l:'Date Added' },
  { k:'recent',   l:'\u23f1 Recent'  },
  { k:'az',       l:'A\u2013Z'       },
  { k:'progress', l:'Completed'    },
];

const loadData = () => {
  try {
    const s = localStorage.getItem(SK);
    const parsed = s ? JSON.parse(s) : null;
    return parsed && parsed.courses ? parsed : { ...EMP };
  } catch {
    return { ...EMP };
  }
};
const saveData   = d  => { try { localStorage.setItem(SK, JSON.stringify(d)); } catch {} };
const loadResume = () => { try { return JSON.parse(localStorage.getItem(RK)||'{}'); } catch { return {}; } };
const saveResume = (map) => { try { localStorage.setItem(RK, JSON.stringify(map)); } catch {} };

const uid     = () => Math.random().toString(36).slice(2,10);
const haptic  = (t='light') => { try { navigator.vibrate?.(t==='medium'?[30,20,30]:t==='heavy'?[50,30,80]:50); } catch {} };
const favicon = url => { if(!url)return null; try{ return `https://www.google.com/s2/favicons?domain=${new URL(url.startsWith('http')?url:'https://'+url).hostname}&sz=64`; }catch{ return null; } };
const pct     = c => { const t=c.chapters?.length||0, d=c.chapters?.filter(x=>x.completed).length||0; return t > 0 ? Math.round(d/t*100) : 0; };

const hasResume = (resumeMap, courseId) => {
  return resumeMap.hasOwnProperty(courseId);
};

function embedUrl(url) {
  if (!url) return null;
  const vimeo = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (vimeo) return `https://player.vimeo.com/video/${vimeo[1]}?autoplay=0&title=0&byline=0&portrait=0`;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  if (yt)   return `https://www.youtube.com/embed/${yt[1]}?enablejsapi=1&origin=${encodeURIComponent(location.origin)}`;
  if (url.includes('wistia'))             return `https://fast.wistia.net/embed/iframe/${url.split('/').pop()}?autoplay=0`;
  if (url.includes('player.hotmart.com')) return url;
  if (url.includes('drive.google.com')) {
    // Match /file/d/ID with any suffix (/view, /preview, etc.)
    const gd = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (gd) return `https://drive.google.com/file/d/${gd[1]}/preview`;
    // Match ?id= style sharing links
    const gd2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (gd2) return `https://drive.google.com/file/d/${gd2[1]}/preview`;
    return null;
  }
  if (url.includes('embed')||url.startsWith('https')) return url;
  return null;
}

const ytIdFrom = url => {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
};
// Capture optional ?t= or &start= timestamp for YouTube embeds
const ytStartFrom = url => {
  if (!url) return null;
  const m = url.match(/[?&](?:t|start)=(\d+)/);
  return m ? parseInt(m[1], 10) : null;
};

// ── Fast video component ──────────────────────────────────────────────
// For YouTube: show thumbnail poster first, load iframe only on click.
// For others: mount iframe immediately but show skeleton until loaded.
function VideoPlayer({ url, activeKey, onEnded }) {
  const embed  = useMemo(() => embedUrl(url), [url]);
  const ytId   = useMemo(() => ytIdFrom(url), [url]);
  const ytStart = useMemo(() => ytStartFrom(url), [url]);

  // YouTube: poster-first strategy
  const [ytReady, setYtReady] = useState(false);
  // Non-YT: loading skeleton
  const [iframeLoaded, setIframeLoaded] = useState(false);

  // Reset on chapter change
  useEffect(() => {
    setYtReady(false);
    setIframeLoaded(false);
  }, [activeKey]);

  // Listen for YT video-ended postMessage to auto-complete
  useEffect(() => {
    if (!ytReady || !ytId) return;
    const onMsg = (e) => {
      try {
        const d = typeof e.data==='string' ? JSON.parse(e.data) : e.data;
        if (d?.event==='onStateChange' && d?.info===0) onEnded?.();
      } catch {}
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [ytReady, ytId, onEnded]);

  if (!embed) return null;

  if (ytId) {
    const thumb = `https://i.ytimg.com/vi/${ytId}/hqdefault.jpg`;
    return (
      <div className="vw">
        {!ytReady ? (
          /* Poster — zero iframe network cost until clicked */
          <div className="vyt-poster" onClick={() => setYtReady(true)}>
            <img src={thumb} alt="video thumbnail" loading="lazy" />
            <div className="vyt-poster-overlay">
              <div className="vyt-play" />
            </div>
          </div>
        ) : (
          <>
            {/* Skeleton shown until iframe fires onLoad */}
            <div className={`vsk ${iframeLoaded ? 'hidden' : ''}`}>
              <div className="vsk-spin" />
              <span className="vsk-txt">Loading video…</span>
            </div>
            <iframe
              key={activeKey}
              src={`https://www.youtube.com/embed/${ytId}?autoplay=1&enablejsapi=1${ytStart?`&start=${ytStart}`:''}&origin=${encodeURIComponent(location.origin)}`}
              allow="autoplay; fullscreen; picture-in-picture"
              allowFullScreen
              onLoad={() => setIframeLoaded(true)}
            />
          </>
        )}
      </div>
    );
  }

  // Non-YouTube embed
  return (
    <div className="vw">
      <div className={`vsk ${iframeLoaded ? 'hidden' : ''}`}>
        <div className="vsk-spin" />
        <span className="vsk-txt">Loading video…</span>
      </div>
      <iframe
        key={activeKey}
        src={embed}
        allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
        allowFullScreen
        onLoad={() => setIframeLoaded(true)}
      />
    </div>
  );
}

const CompanyIcon = React.memo(function CompanyIcon({ company, size=26 }) {
  const [err, setErr] = useState(false);
  const src   = company?.icon || favicon(company?.url);
  const color = GC[(company?.name||'').charCodeAt(0) % GC.length];
  if (src && !err)
    return <img src={src} width={size} height={size} style={{borderRadius:5,objectFit:'contain'}} onError={()=>setErr(true)} loading="lazy" />;
  return <div className="fp" style={{width:size,height:size,background:color+'22',color,fontSize:size*.5}}>{(company?.name||'?')[0].toUpperCase()}</div>;
});

const ChapterRow = React.memo(function ChapterRow({ ch, idx, isActive, onSelect, onEdit, onDelete, mobileSize=false }) {
  const sz = mobileSize ? 32 : 24;
  return (
    <div className={`cr ${isActive?'on':''} ${ch.completed?'dn':''}`}
      style={mobileSize?{paddingRight:10}:{}}
      onClick={onSelect}>
      <div className="cn">{ch.completed?'\u2713':idx+1}</div>
      <div className="ci2">
        <div className="cn2">{ch.name}</div>
        <div className="cm">
          <span className={`cbv ${ch.type==='video'?'bv':'bt'}`}>{ch.type==='video'?'\u25b6 Video':'\u2726 Text'}</span>
          {ch.duration && <span className="cd">{ch.duration}</span>}
        </div>
      </div>
      <div className="cr-acts" style={mobileSize?{opacity:1}:{}}>
        <div className="ib" style={{width:sz,height:sz,fontSize:11}} onClick={e=>{e.stopPropagation();onEdit(idx);}}>&#x270F;&#xFE0F;</div>
        <div className="ib" style={{width:sz,height:sz,fontSize:11}} onClick={e=>{e.stopPropagation();onDelete(idx);}}>&#x1F5D1;</div>
      </div>
    </div>
  );
});

function ChapterList({ chapters, activeIdx, onSelect, onEdit, onDelete, mobile=false }) {
  return (
    <>
      {chapters.length === 0 && (
        <div style={{padding:'28px 16px',color:'var(--tm)',fontSize:13,textAlign:'center',lineHeight:1.7}}>
          No chapters yet.<br/>Add your first one below.
        </div>
      )}
      {chapters.map((ch, i) => {
        const prevMod = i > 0 ? (chapters[i-1].module||'') : null;
        const thisMod = ch.module || '';
        return (
          <React.Fragment key={ch.id||i}>
            {thisMod && thisMod !== prevMod && (
              <div className="modh" style={{paddingTop:i===0?12:20}}>
                <span className="modlbl">{thisMod}</span>
              </div>
            )}
            <ChapterRow
              ch={ch} idx={i} isActive={i===activeIdx}
              onSelect={()=>onSelect(i)} onEdit={onEdit} onDelete={onDelete}
              mobileSize={mobile}
            />
          </React.Fragment>
        );
      })}
    </>
  );
}

function ProgBar({ done, total, showLabel=true }) {
  const p = total > 0 ? Math.round(done/total*100) : 0;
  return (
    <div className="pw">
      {showLabel
        ? <div className="pl"><span>{total>0?`${done}/${total} chapters`:'No chapters'}</span><span style={{color:'var(--ac)'}}>{p}%</span></div>
        : <div style={{fontSize:11,color:'var(--tm)',display:'flex',justifyContent:'space-between',marginBottom:4}}><span>{done}/{total} done</span><span style={{color:'var(--ac)'}}>{p}%</span></div>
      }
      <div className="pb"><div className="pf" style={{width:`${p}%`}}/></div>
    </div>
  );
}

function Toast({ msg }) {
  if (!msg) return null;
  return <div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:'var(--ac)',color:'#0a0e1a',padding:'10px 18px',borderRadius:10,fontSize:13,fontWeight:700,zIndex:2000,whiteSpace:'nowrap'}}>{msg}</div>;
}

function AddCourseModal({ companies, courses, onClose, onSave, editCourse }) {
  const [title, setTitle] = useState(editCourse?.title||'');
  const [thumb, setThumb] = useState(editCourse?.thumbnail||'');
  const [coId,  setCoId]  = useState(editCourse?.companyId||'');
  const [desc,  setDesc]  = useState(editCourse?.description||'');
  const [newCo, setNewCo] = useState('');
  const [newCoUrl,  setNewCoUrl]  = useState('');
  const [newCoIcon, setNewCoIcon] = useState('');
  const [addingCo, setAddingCo]   = useState(false);

  const doSave = useCallback(() => {
    if (!title.trim()) return;
    onSave({ title, thumbnail:thumb, companyId:coId, description:desc });
    onClose();
  }, [title, thumb, coId, desc, onSave, onClose]);

  const addPlatform = useCallback(() => {
    if (!newCo.trim()) return;
    if (companies.some(c=>c.name.toLowerCase()===newCo.toLowerCase())) { alert('Platform already exists'); return; }
    const nc = { id:uid(), name:newCo.trim(), url:newCoUrl.trim(), icon:newCoIcon.trim()||undefined };
    onSave(null, nc);
    setCoId(nc.id); setAddingCo(false); setNewCo(''); setNewCoUrl(''); setNewCoIcon('');
  }, [newCo, newCoUrl, newCoIcon, companies]);

  return (
    <div className="mbk" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mo">
        <div className="mh"><span className="mt">{editCourse?'Edit Course':'Add New Course'}</span><button className="xb" onClick={onClose}>&times;</button></div>
        <div className="mb">
          <div className="fg"><label className="fl">Course Title *</label><input className="fi" placeholder="e.g. Complete JavaScript Bootcamp" value={title} onChange={e=>setTitle(e.target.value)}/></div>
          <div className="fg"><label className="fl">Thumbnail URL</label><input className="fi" placeholder="https://..." value={thumb} onChange={e=>setThumb(e.target.value)}/></div>
          <div className="fg">
            <label className="fl">Platform / Company</label>
            {!addingCo ? (
              <div style={{display:'flex',gap:8}}>
                <select className="fsel" style={{flex:1}} value={coId} onChange={e=>setCoId(e.target.value)}>
                  <option value="">&mdash; None &mdash;</option>
                  {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                {coId && <button className="btn btn-s btn-sm" onClick={()=>{if(courses.some(c=>c.companyId===coId)){alert('Cannot delete: in use');return;}onSave(null,null,companies.filter(c=>c.id!==coId));setCoId('');}}>&#x1F5D1;</button>}
                <button className="btn btn-s" onClick={()=>setAddingCo(true)}>+ New</button>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:8,padding:12,background:'var(--bg2)',borderRadius:8,border:'1px solid var(--bdl)'}}>
                <input className="fi" placeholder="Platform name" value={newCo} onChange={e=>setNewCo(e.target.value)}/>
                <input className="fi" placeholder="Website URL (for favicon)" value={newCoUrl} onChange={e=>setNewCoUrl(e.target.value)}/>
                <input className="fi" placeholder="Icon URL (optional)" value={newCoIcon} onChange={e=>setNewCoIcon(e.target.value)}/>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-p btn-sm" onClick={addPlatform}>Add Platform</button>
                  <button className="btn btn-s btn-sm" onClick={()=>setAddingCo(false)}>Cancel</button>
                </div>
              </div>
            )}
          </div>
          <div className="fg"><label className="fl">Description (optional)</label><textarea className="fta" placeholder="Brief overview\u2026" value={desc} onChange={e=>setDesc(e.target.value)}/></div>
        </div>
        <div className="mf">
          <button className="btn btn-s" onClick={onClose}>Cancel</button>
          <button className="btn btn-p" onClick={doSave} disabled={!title.trim()}>{editCourse?'Save Changes':'Add Course'}</button>
        </div>
      </div>
    </div>
  );
}

function ChapterModal({ chapter, onClose, onSave }) {
  const nl = arr => (arr||[]).map(l=>typeof l==='string'?{label:l,url:l}:l);
  const nf = arr => (arr||[]).map(f=>typeof f==='string'?{name:f,url:''}:f);
  const [name,     setName]     = useState(chapter?.name||'');
  const [mod,      setMod]      = useState(chapter?.module||'');
  const [type,     setType]     = useState(chapter?.type||'video');
  const [dur,      setDur]      = useState(chapter?.duration||'');
  const [videoUrl, setVideoUrl] = useState(chapter?.videoUrl||'');
  const [desc,     setDesc]     = useState(chapter?.description||'');
  const [links,    setLinks]    = useState(nl(chapter?.links));
  const [files,    setFiles]    = useState(nf(chapter?.files));
  const [tab,      setTab]      = useState('basic');

  const doSave = useCallback(() => {
    if (!name.trim()) return;
    onSave({ name, module:mod, type, duration:dur, videoUrl, description:desc, links, files });
  }, [name, mod, type, dur, videoUrl, desc, links, files]);

  const updLink = useCallback((i, field, val) => setLinks(prev => { const u=[...prev]; u[i]={...u[i],[field]:val}; return u; }), []);
  const updFile = useCallback((i, field, val) => setFiles(prev => { const u=[...prev]; u[i]={...u[i],[field]:val}; return u; }), []);

  return (
    <div className="mbk" style={{zIndex:1100}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="mo" style={{maxWidth:620}}>
        <div className="mh"><span className="mt">{chapter?.id?'Edit Chapter':'Add Chapter'}</span><button className="xb" onClick={onClose}>&times;</button></div>
        <div className="mb">
          <div className="tabs">
            {['basic','content','files'].map(t=><button key={t} className={`tabk ${tab===t?'on':''}`} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}</button>)}
          </div>
          {tab==='basic' && <>
            <div className="fg"><label className="fl">Chapter Name *</label><input className="fi" placeholder="e.g. Introduction to Variables" value={name} onChange={e=>setName(e.target.value)}/></div>
            <div className="fg"><label className="fl">Module / Section</label><input className="fi" placeholder="e.g. Module 1: Foundations" value={mod} onChange={e=>setMod(e.target.value)}/><span style={{fontSize:11,color:'var(--tm)',marginTop:3}}>Header appears when module name changes. Leave blank for no header.</span></div>
            <div className="fg"><label className="fl">Chapter Type</label><div style={{display:'flex',gap:8}}>{['video','text'].map(t=><button key={t} className={`btn ${type===t?'btn-p':'btn-s'}`} style={{flex:1}} onClick={()=>setType(t)}>{t==='video'?'\ud83d\udcf9 Video':'\ud83d\udcdd Text Only'}</button>)}</div></div>
            <div className="fg"><label className="fl">Duration (optional)</label><input className="fi" placeholder="e.g. 6:30 or 15 min" value={dur} onChange={e=>setDur(e.target.value)}/></div>
          </>}
          {tab==='content' && <>
            {type==='video' && <div className="fg"><label className="fl">Video URL</label><input className="fi" placeholder="YouTube, Vimeo, Wistia, Google Drive, or embed URL" value={videoUrl} onChange={e=>setVideoUrl(e.target.value)}/><span style={{fontSize:11,color:'var(--tm)'}}>YouTube videos auto-complete when the video ends.</span></div>}
            <div className="fg"><label className="fl">Description / Notes</label><textarea className="fta" style={{minHeight:120}} value={desc} onChange={e=>setDesc(e.target.value)}/></div>
            <div className="fg"><label className="fl">Links</label>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {links.map((l,i)=>(
                  <div key={i} style={{display:'flex',gap:8,alignItems:'center'}}>
                    <input className="fi" placeholder="Label" value={l.label||''} onChange={e=>updLink(i,'label',e.target.value)}/>
                    <input className="fi" placeholder="https://\u2026" value={l.url||''} onChange={e=>{ updLink(i,'url',e.target.value); if(!links[i].label)updLink(i,'label',e.target.value); }}/>
                    <button className="btn btn-d btn-sm" onClick={()=>setLinks(p=>p.filter((_,x)=>x!==i))}>&times;</button>
                  </div>
                ))}
                <button className="btn btn-s btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>setLinks(p=>[...p,{label:'',url:''}])}>+ Add Link</button>
              </div>
            </div>
          </>}
          {tab==='files' && (
            <div className="fg"><label className="fl">Files</label>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {files.map((f,i)=>(
                  <div key={i} style={{display:'flex',gap:8,alignItems:'center'}}>
                    <input className="fi" placeholder="File name" value={f.name||''} onChange={e=>updFile(i,'name',e.target.value)}/>
                    <input className="fi" placeholder="https://\u2026" value={f.url||''} onChange={e=>{ updFile(i,'url',e.target.value); if(!files[i].name)updFile(i,'name',e.target.value); }}/>
                    <button className="btn btn-d btn-sm" onClick={()=>setFiles(p=>p.filter((_,x)=>x!==i))}>&times;</button>
                  </div>
                ))}
                <button className="btn btn-s btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>setFiles(p=>[...p,{name:'',url:''}])}>+ Add File</button>
              </div>
            </div>
          )}
        </div>
        <div className="mf"><button className="btn btn-s" onClick={onClose}>Cancel</button><button className="btn btn-p" onClick={doSave} disabled={!name.trim()}>Save Chapter</button></div>
      </div>
    </div>
  );
}

function GlobalNotesPage({ data, onOpenCourse }) {
  const [search, setSearch] = useState('');
  const q = search.trim().toLowerCase();

  const { allNotes, filtered } = useMemo(() => {
    const all = [];
    data.courses.forEach(course => {
      (course.chapters||[]).forEach((ch, idx) => {
        if (ch.notes?.trim()) all.push({ course, chapter:ch, idx });
      });
    });
    const filt = q ? all.filter(n =>
      n.chapter.notes.toLowerCase().includes(q) ||
      n.chapter.name.toLowerCase().includes(q)  ||
      n.course.title.toLowerCase().includes(q)
    ) : all;
    return { allNotes:all, filtered:filt };
  }, [data.courses, q]);

  const hl = (text) => {
    if (!q) return text;
    const lo = text.toLowerCase(), i = lo.indexOf(q);
    if (i === -1) return text;
    return <>{text.slice(0,i)}<mark>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="topbar">
        <span className="topbar-title">&#x1F4D3; <span>My Notes</span></span>
        <div className="si-wrap">
          <span className="si-ico">&#x1F50D;</span>
          <input className="fi si" placeholder="Search notes\u2026" value={search} onChange={e=>setSearch(e.target.value)} style={{width:220,padding:'7px 12px 7px 34px'}}/>
        </div>
      </div>
      <div className="content">
        {allNotes.length === 0 ? (
          <div className="es"><div className="es-ico">&#x1F4D3;</div><div className="es-t">No notes yet</div><div className="es-s">Open any course chapter and start writing &mdash; notes appear here.</div></div>
        ) : filtered.length === 0 ? (
          <div className="es"><div className="es-ico">&#x1F50D;</div><div className="es-t">No matches</div><div className="es-s">No notes match &ldquo;{search}&rdquo;.</div></div>
        ) : (
          <>
            <div style={{marginBottom:16,fontSize:13,color:'var(--tm)'}}>{filtered.length} note{filtered.length!==1?'s':''}{q?` matching "${search}"`:''} &mdash; click to jump</div>
            <div className="ngl">
              {filtered.map(({course,chapter,idx}) => (
                <div key={`${course.id}-${idx}`} className="nc" onClick={()=>onOpenCourse(course.id,idx,true)}>
                  <div className="nc-co">{course.title}</div>
                  <div className="nc-ch">Ch.{idx+1} &mdash; {chapter.name}</div>
                  <div className="nc-pv">{hl(chapter.notes)}</div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function HomePage({ data, onOpenCourse, onUpdate, filterCompany, setFilterCompany, resumeMap, showImportMobile, setShowImportMobile, showAddCourseMobile, setShowAddCourseMobile }) {
  const [showAdd,    setShowAdd]    = useState(false);
  const [editCourse, setEditCourse] = useState(null);
  const [search,     setSearch]     = useState('');
  const [menuOpen,   setMenuOpen]   = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [selFile,    setSelFile]    = useState(null);
  const [impErr,     setImpErr]     = useState('');
  const [sortBy,     setSortBy]     = useState('recent');
  const [toast,      setToast]      = useState('');

  useEffect(() => { if (showImportMobile)    { setShowImport(true);                setShowImportMobile(false);    } }, [showImportMobile]);
  useEffect(() => { if (showAddCourseMobile) { setEditCourse(null); setShowAdd(true); setShowAddCourseMobile(false); } }, [showAddCourseMobile]);

  const closeMenu = useCallback(() => setMenuOpen(null), []);
  useEffect(() => {
    const handler = (e) => { if (!e.target.closest('.menu')) closeMenu(); };
    window.addEventListener('click', handler);
    return () => window.removeEventListener('click', handler);
  }, []);

  const { companies, courses } = data;

  const filtered = useMemo(() => {
    const sq = search.toLowerCase();
    let list = courses.filter(c => {
      const matchesCompany = filterCompany === 'all' || c.companyId === filterCompany;
      const matchesSearch  = !sq || c.title.toLowerCase().includes(sq);
      return matchesCompany && matchesSearch;
    });
    if (sortBy === 'az')            list = [...list].sort((a,b)=>a.title.localeCompare(b.title));
    else if (sortBy === 'progress') list = list.filter(c => pct(c) === 100);
    else if (sortBy === 'recent')   list = [...list].sort((a,b)=>(b.lastAccessed||0)-(a.lastAccessed||0));
    return list;
  }, [courses, filterCompany, search, sortBy]);

  const coMap = useMemo(() => Object.fromEntries(companies.map(c=>[c.id,c])), [companies]);
  const showToast = useCallback((msg) => { setToast(msg); setTimeout(()=>setToast(''), 2500); }, []);

  const handleSaveCourse = useCallback((course, newCo, updCos) => {
    if (updCos) { onUpdate({ ...data, companies:updCos }); return; }
    if (newCo)  { onUpdate({ ...data, companies:[...companies, newCo] }); return; }
    if (course) {
      const courses2 = editCourse
        ? data.courses.map(c => c.id===editCourse.id ? {...c,...course} : c)
        : [...data.courses, { id:uid(), ...course, chapters:[], progress:0 }];
      onUpdate({ ...data, courses:courses2 });
      setShowAdd(false); setEditCourse(null);
    }
  }, [data, editCourse]);

  const handleDelete = useCallback((id, e) => {
    e.stopPropagation();
    const c = data.courses.find(x=>x.id===id);
    if (!confirm(`Delete "${c?.title}"?`)) return;
    const nc = data.courses.filter(x=>x.id!==id);
    // Only delete companies that are truly unused across ALL remaining courses
    const usedByRemaining = new Set(nc.map(x=>x.companyId).filter(Boolean));
    onUpdate({ ...data, courses:nc, companies:data.companies.filter(co=>usedByRemaining.has(co.id)) });
  }, [data]);

  const doExport = useCallback(() => {
    const blob = new Blob([JSON.stringify({companies,courses},null,2)],{type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `courseflow-backup-${new Date().toISOString().replace(/[:.]/g,'-')}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('\u2713 Backup downloaded!');
  }, [companies, courses]);


  const handleFileImport = (file) => {
    if (!file) return;
    if (!file.name.endsWith('.json')) { setImpErr('Please upload a valid JSON file.'); return; }
    const r = new FileReader();
    r.onload = e => {
      try {
        const p = JSON.parse(e.target.result);
        if (!p.courses||!p.companies) { setImpErr('Invalid format.'); return; }
        // Deduplicate companies by name (case-insensitive)
        const existingNames = new Set(data.companies.map(c=>c.name.toLowerCase()));
        const newCompanies = p.companies.filter(c => !existingNames.has(c.name.toLowerCase()));
        // Remap companyIds in imported courses if they clash
        const idRemap = {};
        p.companies.forEach(ic => {
          const match = data.companies.find(ec => ec.name.toLowerCase() === ic.name.toLowerCase());
          if (match && match.id !== ic.id) idRemap[ic.id] = match.id;
        });
        const remappedCourses = p.courses.map(c => ({
          ...c,
          companyId: idRemap[c.companyId] || c.companyId
        }));
        onUpdate({
          courses: [...data.courses, ...remappedCourses],
          companies: [...data.companies, ...newCompanies]
        });
        setShowImport(false); setImpErr('');
      } catch { setImpErr('Invalid JSON.'); }
    };
    r.readAsText(file);
  };

  const visibleCos = useMemo(() => companies.filter(co=>courses.some(c=>c.companyId===co.id)), [companies, courses]);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="topbar">
        <span className="topbar-title">Course<span>Flow</span></span>
        <div className="si-wrap">
          <span className="si-ico">&#x1F50D;</span>
          <input className="fi si" placeholder="Search courses\u2026" value={search} onChange={e=>setSearch(e.target.value)} style={{width:220,padding:'7px 12px 7px 34px'}}/>
        </div>
        <button className="btn btn-s btn-sm dsk" onClick={()=>setShowImport(true)}>&#x1F4E5; Import</button>
        <button className="btn btn-s btn-sm dsk" onClick={doExport}>&#x1F4BE; Export</button>
        <button className="btn btn-p dsk" onClick={()=>{setEditCourse(null);setShowAdd(true);}}>+ Add Course</button>
      </div>

      <div className="content">
        {visibleCos.length > 0 && (
          <div className="chips">
            <div className={`chip ${filterCompany==='all'?'on':''}`} onClick={()=>setFilterCompany('all')}>&#x2B21; All ({courses.length})</div>
            {visibleCos.map(co => (
              <div key={co.id} className={`chip ${filterCompany===co.id?'on':''}`} onClick={()=>setFilterCompany(filterCompany===co.id?'all':co.id)}>
                <CompanyIcon company={co} size={16}/> {co.name} ({courses.filter(c=>c.companyId===co.id).length})
              </div>
            ))}
          </div>
        )}

        <div className="sh">
          <div>
            <span className="st">
              {filterCompany==='all'?'All Courses':coMap[filterCompany]?.name||'Courses'}
            </span>
            <span className="sc">
              {filtered.length} course{filtered.length!==1?'s':''}
            </span>
          </div>
          <div className="sort-row">
            {SORTS.map(o => (
              <button key={o.k} className={`sk ${sortBy===o.k?'on':''}`} onClick={()=>setSortBy(o.k)}>{o.l}</button>
            ))}
          </div>
        </div>

        {filtered.length === 0 ? (
          <div className="es">
            <div className="es-ico">&#x1F4DA;</div>
            <div className="es-t">{courses.length===0?'No courses yet':'No courses found'}</div>
            <div className="es-s">{courses.length===0?'Start by adding your first course.':'Try adjusting your search or filter.'}</div>
            {courses.length===0 && <button className="btn btn-p" onClick={()=>setShowAdd(true)}>Add Your First Course</button>}
          </div>
        ) : (
          <div className="grid">
            {filtered.map((course,i) => {
              const company = coMap[course.companyId];
              const res   = hasResume(resumeMap, course.id);
              const rIdx  = resumeMap[course.id] ?? 0;
              const chapters = course.chapters || [];
              const rName = chapters[rIdx]?.name;
              return (
                <div key={course.id} className="card" onClick={() => onOpenCourse(course.id, resumeMap[course.id] ?? 0)}>
                  <div style={{position:'absolute',top:8,left:8,zIndex:50}}>
                    <div className="ib" style={{fontSize:10,letterSpacing:2}} onClick={e=>{e.stopPropagation();setMenuOpen(menuOpen===course.id?null:course.id);}}>&#x2022;&#x2022;&#x2022;</div>
                    {menuOpen===course.id && (
                      <div className="menu" onClick={e=>e.stopPropagation()} style={{position:'absolute',top:34,left:0,background:'var(--bgc)',border:'1px solid var(--bdl)',borderRadius:10,padding:6,display:'flex',flexDirection:'column',gap:4,minWidth:130,boxShadow:'0 10px 30px rgba(0,0,0,.5)'}}>
                        <div style={{padding:'6px 10px',cursor:'pointer',borderRadius:6}} onClick={e=>{e.stopPropagation();setEditCourse(course);setShowAdd(true);setMenuOpen(null);}}>&#x270F;&#xFE0F; Edit</div>
                        <div style={{padding:'6px 10px',cursor:'pointer',borderRadius:6,color:'var(--red)'}} onClick={e=>{handleDelete(course.id,e);setMenuOpen(null);}}>&#x1F5D1; Delete</div>
                      </div>
                    )}
                  </div>
                  {course.thumbnail ? (
                    <div className="c-thumb">
                      <img src={course.thumbnail} alt={course.title} loading="lazy" onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex';}}/>
                      <div style={{display:'none',width:'100%',aspectRatio:'16/9',alignItems:'center',justifyContent:'center',fontSize:36}} className={`g${i%6}`}>&#x1F4D6;</div>
                      {company && <div className="c-badge"><CompanyIcon company={company} size={18}/></div>}
                      {res     && <div className="c-resume">&#x25B6; Resume</div>}
                    </div>
                  ) : (
                    <div className={`c-ph g${i%6}`}>
                      <span>&#x1F4D6;</span>
                      {company && <div className="c-badge"><CompanyIcon company={company} size={18}/></div>}
                      {res     && <div className="c-resume">&#x25B6; Resume</div>}
                    </div>
                  )}
                  <div className="c-body">
                    <div className="c-name">{course.title}</div>
                    {res && rName
                      ? <div className="c-desc" style={{color:'var(--ac)',opacity:.9}}>&#x25B6; Continue: {rName}</div>
                      : course.description && <div className="c-desc">{course.description}</div>
                    }
                    <ProgBar done={course.chapters?.filter(c=>c.completed).length||0} total={course.chapters?.length||0} />
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {showAdd && <AddCourseModal companies={companies} courses={courses} editCourse={editCourse} onClose={()=>{setShowAdd(false);setEditCourse(null);}} onSave={handleSaveCourse}/>}

      {showImport && (
        <div className="mbk" onClick={e=>e.target===e.currentTarget&&setShowImport(false)}>
          <div className="mo">
            <div className="mh"><span className="mt">Import Data</span><button className="xb" onClick={()=>setShowImport(false)}>&times;</button></div>
            <div className="mb">
              <div className="fg">
                <label className="fl">Upload JSON Backup</label>
                <input type="file" id="fileInput" accept=".json" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f){setSelFile(f.name);handleFileImport(f);}}}/>
                <label htmlFor="fileInput"
                  onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f){setSelFile(f.name);handleFileImport(f);}}}
                  onDragOver={e=>e.preventDefault()}
                  style={{border:'2px dashed var(--bdl)',borderRadius:10,padding:20,textAlign:'center',cursor:'pointer',display:'block'}}>
                  <div style={{marginBottom:10}}>&#x1F4C1; Drag &amp; drop JSON file</div>
                  <span className="btn btn-s btn-sm">Choose File</span>
                  {selFile && <div style={{marginTop:10,fontSize:12,color:'var(--t2)'}}>{selFile}</div>}
                </label>
              </div>
              {impErr && <div style={{color:'var(--red)',fontSize:13}}>{impErr}</div>}
            </div>
          </div>
        </div>
      )}

      <Toast msg={toast}/>
    </div>
  );
}

function CoursePage({ courseId, data, onBack, onUpdate, resumeMap, onResumeUpdate, mobileNotesOpen, setMobileNotesOpen, initChapterIdx, onChapterChange }) {
  const course  = useMemo(() => data.courses.find(c=>c.id===courseId), [data.courses, courseId]);
  const company = useMemo(() => data.companies.find(c=>c.id===course?.companyId), [data.companies, course?.companyId]);
  const chapters = course?.chapters || [];

  const [activeIdx,  setActiveIdxRaw] = useState(initChapterIdx ?? 0);
  const [showNotes,  setShowNotes]    = useState(false);
  const [showModal,  setShowModal]    = useState(false);
  const [editIdx,    setEditIdx]      = useState(null);
  const [noteSaved,  setNoteSaved]    = useState(false);
  const [popAnim,    setPopAnim]      = useState(false);

  // Unique key per chapter view — forces VideoPlayer to reset
  const [videoKey, setVideoKey] = useState(0);

  const noteTimer   = useRef(null);
  const noteHideRef = useRef(null);

  useEffect(() => {
    if (initChapterIdx !== undefined && initChapterIdx !== activeIdx) {
      setActiveIdxRaw(initChapterIdx);
      setVideoKey(k => k + 1);
    }
  }, [initChapterIdx]);

  if (!course) return null;
  const chapter = chapters[activeIdx];

  const updateCourse = useCallback((updated) => {
    onUpdate({ ...data, courses: data.courses.map(c=>c.id===courseId ? updated : c) });
  }, [data, courseId]);

  const setActiveIdx = useCallback((idx) => {
    setActiveIdxRaw(idx);
    setVideoKey(k => k + 1);
    const updatedResume = { ...resumeMap, [courseId]: idx };
    onResumeUpdate(updatedResume);
    onChapterChange?.(idx);
  }, [resumeMap, courseId, onResumeUpdate, onChapterChange]);

  const saveNote = useCallback((val) => {
    // Optimistically update in-memory state immediately for responsive UI
    const nc = chapters.map((c, i) => i === activeIdx ? { ...c, notes: val } : c);
    updateCourse({ ...course, chapters: nc });
    // Debounce the "Saved" indicator — don't flash it on every keystroke
    setNoteSaved(false);
    clearTimeout(noteHideRef.current);
    noteHideRef.current = setTimeout(() => setNoteSaved(true), 600);
  }, [chapters, activeIdx, course, updateCourse]);

  useEffect(() => () => { clearTimeout(noteTimer.current); clearTimeout(noteHideRef.current); }, []);

  const markComplete = useCallback((forceDone) => {
    const will = forceDone !== undefined ? forceDone : !chapter?.completed;
    const nc = chapters.map((c,i)=>i===activeIdx?{...c,completed:will}:c);
    updateCourse({ ...course, chapters:nc });
    if (will) { haptic('medium'); setPopAnim(true); setTimeout(()=>setPopAnim(false),400); }
    else haptic('light');
  }, [chapter, chapters, activeIdx, course]);

  const handleSaveChapter = useCallback((chData) => {
    let nc;
    if (editIdx !== null) {
      nc = chapters.map((c,i)=>i===editIdx?{...c,...chData}:c);
      setEditIdx(null);
    } else {
      nc = [...chapters, { id:uid(), ...chData, completed:false, notes:'' }];
      // Use setActiveIdx so resume map + videoKey both update
      setActiveIdx(nc.length - 1);
    }
    updateCourse({ ...course, chapters:nc });
    setShowModal(false);
  }, [chapters, editIdx, course, setActiveIdx]);

  const handleDeleteChapter = useCallback((idx) => {
    if (!confirm('Delete this chapter?')) return;
    const nc = chapters.filter((_,i)=>i!==idx);
    updateCourse({ ...course, chapters:nc });
    if (activeIdx >= nc.length) {
      const newIdx = Math.max(0, nc.length - 1);
      setActiveIdx(newIdx);
    }
  }, [chapters, activeIdx, course, setActiveIdx]);

  const doneCount = useMemo(() => chapters.filter(c=>c.completed).length, [chapters]);
  const listProps = { chapters, activeIdx, onSelect:setActiveIdx, onEdit:(i)=>{setEditIdx(i);setShowModal(true);}, onDelete:handleDeleteChapter };

  return (
    <div className="cp" style={{height:'100%'}}>
      <div className="ci">
        <div className="ci-hd">
          <button className="btn btn-s btn-sm" onClick={onBack} style={{marginBottom:10}}>&larr; Back</button>
          <div className="ci-lbl">Course Index</div>
          <div className="ci-ttl">{course.title}</div>
          <ProgBar done={doneCount} total={chapters.length} showLabel={false}/>
        </div>
        <div className="ci-list"><ChapterList {...listProps}/></div>
        <div className="acr"><button className="btn btn-s" style={{width:'100%',justifyContent:'center'}} onClick={()=>{setEditIdx(null);setShowModal(true);}}>+ Add Chapter</button></div>
      </div>

      <div className="cm2">
        <div className="ctb">
          {company && <CompanyIcon company={company} size={22}/>}
          <div className="cttl">{chapter?.name||'Select a chapter'}</div>
          {chapter && (
            <div className="cbtn" onClick={()=>markComplete()}>
              <div className={`chk ${chapter.completed?'on':''} ${popAnim?'pop':''}`}/>
              <span style={{fontSize:13,color:chapter.completed?'var(--ac)':'var(--t2)',fontWeight:600}}>
                {chapter.completed?'Completed':'Mark Complete'}
              </span>
            </div>
          )}
          <button className="btn btn-s btn-sm dsk" onClick={()=>setShowNotes(v=>!v)}>
            {showNotes?'\u25a7 Hide Notes':'\u25a8 Notes'}
          </button>
        </div>

        <div className="cca">
          <div className="cv">
            {!chapter ? (
              <div className="es" style={{padding:'60px 20px'}}>
                <div className="es-ico">&#x1F4D6;</div><div className="es-t">No chapters yet</div>
                <div className="es-s">Add chapters to start building your course content.</div>
                <button className="btn btn-p" onClick={()=>setShowModal(true)}>Add First Chapter</button>
              </div>
            ) : (
              <>
                {chapter.type==='video' && (
                  chapter.videoUrl
                    ? <VideoPlayer
                        url={chapter.videoUrl}
                        activeKey={`${courseId}-${activeIdx}-${videoKey}`}
                        onEnded={() => { if (!chapter.completed) markComplete(true); }}
                      />
                    : <div className="vph"><span style={{fontSize:40}}>&#x25B6;</span><span>No video URL set</span><button className="btn btn-s btn-sm" onClick={()=>{setEditIdx(activeIdx);setShowModal(true);}}>Add Video URL</button></div>
                )}
                {chapter.description && <div className="ds"><div className="ds-t">&#x1F4CB; Description</div><div className="ds-p">{chapter.description}</div></div>}
                {chapter.links?.length > 0 && (
                  <div className="ds"><div className="ds-t">&#x1F517; Resources</div><div className="ll">
                    {chapter.links.map((l,i)=>{const lk=typeof l==='string'?{label:l,url:l}:l;return<a key={i} href={lk.url} target="_blank" rel="noopener noreferrer" className="li">&#x1F517; {lk.label||lk.url}</a>;})}
                  </div></div>
                )}
                {chapter.files?.length > 0 && (
                  <div className="ds"><div className="ds-t">&#x1F4C1; Files</div><div className="fl2">
                    {chapter.files.map((f,i)=>{const fi=typeof f==='string'?{name:f,url:''}:f;const il=!fi.name&&fi.url;return<a key={i} href={fi.url||'#'} target="_blank" rel="noopener noreferrer" className="fi2" style={{color:il?'var(--ac2)':'inherit',cursor:fi.url?'pointer':'default'}}><span style={{fontSize:18}}>{il?'&#x1F517;':'&#x1F4C4;'}</span><span className="fi2-n">{fi.name||fi.url}</span></a>;})}
                  </div></div>
                )}
                {!chapter.description && !chapter.links?.length && !chapter.files?.length && chapter.type==='text' && (
                  <div className="ds" style={{textAlign:'center',padding:'40px 20px',color:'var(--tm)'}}>
                    <div style={{fontSize:32,marginBottom:10}}>&#x1F4DD;</div><div>No content yet.</div>
                    <button className="btn btn-s btn-sm" style={{marginTop:12}} onClick={()=>{setEditIdx(activeIdx);setShowModal(true);}}>Add Content</button>
                  </div>
                )}
              </>
            )}
          </div>

          <div className={`np ${showNotes?'':'hide'}`}>
            {showNotes && <>
              <div className="np-hd"><span className="np-t">&#x1F4D3; My Notes</span><span style={{fontSize:11,color:'var(--tm)'}}>{chapter?.name}</span></div>
              <div className="na">
                <textarea className="nta" placeholder={`Notes for "${chapter?.name||'this chapter'}"\u2026\n\nKey points, code, questions.`} value={chapter?.notes||''} onChange={e=>saveNote(e.target.value)}/>
                <div className="nsv">{noteSaved?'\u2713 Saved':''}</div>
              </div>
            </>}
          </div>
        </div>
      </div>

      <div className={`mns ${mobileNotesOpen?'open':''}`}>
        <div className="mns-bk" onClick={()=>setMobileNotesOpen&&setMobileNotesOpen(false)}/>
        <div className="mns-pn">
          <div className="mns-hnd"/>
          <div className="np-hd" style={{padding:'8px 16px 12px'}}>
            <span className="np-t">&#x1F4D3; My Notes</span>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:'var(--tm)'}}>{chapter?.name}</span>
              <button className="xb" onClick={()=>setMobileNotesOpen&&setMobileNotesOpen(false)}>&times;</button>
            </div>
          </div>
          <div className="na" style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            <textarea className="nta" style={{flex:1,minHeight:0,fontSize:16}} placeholder={`Notes for "${chapter?.name||'this chapter'}"\u2026`} value={chapter?.notes||''} onChange={e=>saveNote(e.target.value)}/>
            <div className="nsv" style={{textAlign:'right',padding:'4px 0'}}>{noteSaved?'\u2713 Saved':''}</div>
          </div>
        </div>
      </div>

      {showModal && (
        <ChapterModal
          chapter={editIdx!==null?chapters[editIdx]:null}
          onClose={()=>{setShowModal(false);setEditIdx(null);}}
          onSave={handleSaveChapter}
        />
      )}
    </div>
  );
}

function MobileCourseIndex({ courseId, data, onUpdate, onClose, activeChapterIdx, onSelectChapter }) {
  const course   = useMemo(() => data.courses.find(c=>c.id===courseId), [data.courses, courseId]);
  const [showModal, setShowModal] = useState(false);
  const [editIdx,   setEditIdx]   = useState(null);
  if (!course) return null;

  const chapters = course.chapters||[];
  const done     = chapters.filter(c=>c.completed).length;

  const updateCourse = (updated) => onUpdate({ ...data, courses:data.courses.map(c=>c.id===courseId?updated:c) });

  const handleSaveChapter = (chData) => {
    const isEdit = editIdx !== null;
    const nc = isEdit
      ? chapters.map((c,i)=>i===editIdx?{...c,...chData}:c)
      : [...chapters,{id:uid(),...chData,completed:false,notes:''}];
    if (isEdit) setEditIdx(null);
    updateCourse({...course,chapters:nc});
    // Jump to newly added chapter
    if (!isEdit) onSelectChapter(nc.length - 1);
    setShowModal(false);
  };

  const handleDelete = (idx) => {
    if (!confirm('Delete this chapter?')) return;
    updateCourse({...course,chapters:chapters.filter((_,i)=>i!==idx)});
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="ci-hd" style={{padding:'14px 16px'}}>
        <button className="btn btn-s btn-sm" onClick={onClose} style={{marginBottom:10}}>&times; Close</button>
        <div className="ci-lbl">Course Index</div>
        <div className="ci-ttl">{course.title}</div>
        <ProgBar done={done} total={chapters.length} showLabel={false}/>
      </div>
      <div className="ci-list" style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        <ChapterList
          chapters={chapters}
          activeIdx={activeChapterIdx}
          onSelect={(i) => { onSelectChapter(i); onClose(); }}
          onEdit={(i)=>{setEditIdx(i);setShowModal(true);}}
          onDelete={handleDelete}
          mobile={true}
        />
      </div>
      <div className="acr"><button className="btn btn-s" style={{width:'100%',justifyContent:'center'}} onClick={()=>{setEditIdx(null);setShowModal(true);}}>+ Add Chapter</button></div>
      {showModal && (
        <ChapterModal
          chapter={editIdx!==null?chapters[editIdx]:null}
          onClose={()=>{setShowModal(false);setEditIdx(null);}}
          onSave={handleSaveChapter}
        />
      )}
    </div>
  );
}

function App() {
  const [data,      setData]      = useState(loadData);
  const [view,      setView]      = useState('home');
  const [filter,    setFilter]    = useState('all');
  const [resumeMap, setResumeMap] = useState(loadResume);

  const [mobileNotes,   setMobileNotes]   = useState(false);
  const [mobileSidebar, setMobileSidebar] = useState(false);
  const [showImportMob, setShowImportMob] = useState(false);
  const [showAddMob,    setShowAddMob]    = useState(false);
  const [activeChapterIdx, setActiveChapterIdx] = useState(0);

  const dataRef = useRef(data);
  useEffect(() => { dataRef.current = data; }, [data]);
  const resumeMapRef = useRef(resumeMap);
  useEffect(() => { resumeMapRef.current = resumeMap; }, [resumeMap]);

  const updateResume = useCallback((newMap) => {
    setResumeMap(newMap);
    saveResume(newMap);
  }, []);

  const handleUpdate = useCallback((d) => { setData(d); saveData(d); }, []);
  const handleBack   = useCallback(() => { setView('home'); setMobileSidebar(false); }, []);

  const handleOpenCourse = useCallback((id, chIdx, fromNotes=false) => {
    const currentData = dataRef.current;
    const currentResume = resumeMapRef.current;
    const savedIdx = currentResume[id] ?? 0;
    const idx = chIdx !== undefined ? chIdx : savedIdx;
    setActiveChapterIdx(idx);
    // Stamp lastAccessed so "Recent" sort works correctly
    const updatedCourses = currentData.courses.map(c => c.id === id ? { ...c, lastAccessed: Date.now() } : c);
    const newData = { ...currentData, courses: updatedCourses };
    setData(newData); saveData(newData);
    // Only update resume position if NOT navigating from Notes
    if (!fromNotes) {
      const newMap = { ...currentResume, [id]: idx };
      setResumeMap(newMap); saveResume(newMap);
    }
    setView(id);
  }, []);

  const handleChapterChange = useCallback((idx) => {
    setActiveChapterIdx(idx);
  }, []);

  const handleMobileSelectChapter = useCallback((idx) => {
    setActiveChapterIdx(idx);
    setMobileSidebar(false);
  }, []);

  const exportMobile = useCallback(() => {
    const { companies, courses } = data;
    const b = new Blob([JSON.stringify({companies,courses},null,2)],{type:'application/json'});
    const u = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href=u; a.download=`courseflow-backup-${new Date().toISOString().replace(/[:.]/g,'-')}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
  }, [data]);

  const isCourse = view !== 'home' && view !== 'notes';
  const sidebarCos = useMemo(() => data.companies.filter(co=>data.courses.some(c=>c.companyId===co.id)), [data.companies, data.courses]);
  const activeCourseCoId = useMemo(() => isCourse ? data.courses.find(c=>c.id===view)?.companyId : null, [isCourse, data.courses, view]);

  return (
    <div style={{display:'flex',position:'fixed',inset:0,overflow:'hidden'}}>
      <div className="sb">
        <div className="sb-logo" onClick={()=>setView('home')} title="CourseFlow">CF</div>
        <div className="sb-div"/>
        <div className={`sb-item ${view==='home'&&filter==='all'?'on':''}`} onClick={()=>{setView('home');setFilter('all');}}>
          <span style={{fontSize:18}}>&#x2B21;</span><span className="sb-tip">All Courses</span>
        </div>
        <div className={`sb-item ${view==='notes'?'on':''}`} onClick={()=>setView('notes')}>
          <span style={{fontSize:18}}>&#x1F4D3;</span><span className="sb-tip">My Notes</span>
        </div>
        <div className="sb-div"/>
        {sidebarCos.map(co => (
          <div key={co.id} className={`sb-item ${(activeCourseCoId===co.id)||(view==='home'&&filter===co.id)?'on':''}`}
            onClick={()=>{setView('home');setFilter(co.id);}}>
            <CompanyIcon company={co} size={26}/><span className="sb-tip">{co.name}</span>
          </div>
        ))}
      </div>

      <div className="main">
        {view==='home' && (
          <HomePage
            data={data} onOpenCourse={handleOpenCourse} onUpdate={handleUpdate}
            filterCompany={filter} setFilterCompany={setFilter}
            resumeMap={resumeMap}
            showImportMobile={showImportMob} setShowImportMobile={setShowImportMob}
            showAddCourseMobile={showAddMob}  setShowAddCourseMobile={setShowAddMob}
          />
        )}
        {view==='notes' && <GlobalNotesPage data={data} onOpenCourse={handleOpenCourse}/>}
        {isCourse && (
          <CoursePage
            courseId={view} data={data} onBack={handleBack} onUpdate={handleUpdate}
            resumeMap={resumeMap}
            onResumeUpdate={updateResume}
            mobileNotesOpen={mobileNotes} setMobileNotesOpen={setMobileNotes}
            initChapterIdx={activeChapterIdx}
            onChapterChange={handleChapterChange}
          />
        )}
      </div>

      <nav className="mbn">
        {isCourse ? (
          <>
            <button className="mni" onClick={handleBack}><span className="mni-i">&larr;</span><span>Home</span></button>
            <button className={`mni ${mobileSidebar?'on':''}`} onClick={()=>setMobileSidebar(true)}><span className="mni-i">&#x2630;</span><span>Chapters</span></button>
            <button className={`mni ${mobileNotes?'on':''}`} onClick={()=>setMobileNotes(v=>!v)}><span className="mni-i">&#x1F4D3;</span><span>{mobileNotes?'Hide':'Notes'}</span></button>
          </>
        ) : (
          <>
            <button className={`mni ${view==='home'?'on':''}`} onClick={()=>setView('home')}><span className="mni-i">&#x2B21;</span><span>Courses</span></button>
            <button className={`mni ${view==='notes'?'on':''}`} onClick={()=>setView('notes')}><span className="mni-i">&#x1F4D3;</span><span>Notes</span></button>
            <button className="mni" onClick={()=>setShowAddMob(true)}><span className="mni-i">&#xFF0B;</span><span>Add</span></button>
            <button className="mni" onClick={()=>setShowImportMob(true)}><span className="mni-i">&#x1F4E5;</span><span>Import</span></button>
            <button className="mni" onClick={exportMobile}><span className="mni-i">&#x1F4BE;</span><span>Export</span></button>
          </>
        )}
      </nav>

      <div className={`mss ${mobileSidebar?'open':''}`}>
        <div className="mss-bk" onClick={()=>setMobileSidebar(false)}/>
        <div className="mss-pn" onClick={e=>e.stopPropagation()}>
          {isCourse && (
            <MobileCourseIndex
              courseId={view} data={data} onUpdate={handleUpdate}
              onClose={()=>setMobileSidebar(false)}
              activeChapterIdx={activeChapterIdx}
              onSelectChapter={handleMobileSelectChapter}
            />
          )}
        </div>
      </div>

      <div className={`mns ${mobileNotes?'open':''}`}>
        <div className="mns-bk" onClick={()=>setMobileNotes(false)}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
