<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>CourseFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #161d2e;
    --bg-hover: #1e2740;
    --bg-sidebar: #0d1220;
    --accent: #10e68c;
    --accent-dim: #0bbf76;
    --accent-glow: rgba(16,230,140,0.15);
    --accent-2: #4f8ef7;
    --text-primary: #e8edf5;
    --text-secondary: #8b95a8;
    --text-muted: #4a5568;
    --border: #1e2d45;
    --border-light: #263548;
    --red: #f56565;
    --yellow: #f6c90e;
    --purple: #a78bfa;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; overflow-x:hidden; -webkit-text-size-adjust:100%; }
  #root { display:flex; height:100vh; height:100dvh; overflow:hidden; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:10px; }

  /* SIDEBAR */
  .sidebar {
    width:68px; background:var(--bg-sidebar); border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding:16px 0; gap:6px;
    flex-shrink:0; z-index:10; overflow-y:auto;
  }
  .sidebar-logo {
    width:40px; height:40px; background:var(--accent); border-radius:10px;
    display:flex; align-items:center; justify-content:center; margin-bottom:12px;
    font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:#0a0e1a; cursor:pointer;
    flex-shrink:0;
  }
  .sidebar-divider { width:32px; height:1px; background:var(--border); margin:6px 0; flex-shrink:0; }
  .sidebar-item {
    width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .15s; position:relative; flex-shrink:0; overflow:hidden;
    border:2px solid transparent;
  }
  .sidebar-item:hover { background:var(--bg-hover); }
  .sidebar-item.active { background:var(--accent-glow); border-color:var(--accent); }
  .sidebar-item img { width:26px; height:26px; object-fit:contain; border-radius:5px; }
  .sidebar-item .favicon-placeholder {
    width:26px; height:26px; border-radius:5px; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; font-family:'Syne',sans-serif;
  }
  .sidebar-tooltip {
    position:absolute; left:56px; background:#1e2740; color:var(--text-primary); font-size:12px;
    padding:4px 10px; border-radius:6px; white-space:nowrap; pointer-events:none;
    opacity:0; transition:opacity .15s; border:1px solid var(--border-light); z-index:100;
  }
  .sidebar-item:hover .sidebar-tooltip { opacity:1; }

  /* MAIN */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .topbar {
    height:60px; background:var(--bg-secondary); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 24px; gap:16px; flex-shrink:0;
    padding-top:env(safe-area-inset-top, 0px);
  }
  .topbar-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; flex:1; }
  .topbar-title span { color:var(--accent); }
  .btn {
    display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px;
    font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all .15s; font-family:'DM Sans',sans-serif;
  }
  .btn-primary { background:var(--accent); color:#0a0e1a; }
  .btn-primary:hover { background:var(--accent-dim); transform:translateY(-1px); }
  .btn-secondary { background:transparent; color:var(--text-secondary); border:1px solid var(--border-light); }
  .btn-secondary:hover { background:var(--bg-hover); color:var(--text-primary); }
  .btn-danger { background:transparent; color:var(--red); border:1px solid rgba(245,101,101,.3); }
  .btn-danger:hover { background:rgba(245,101,101,.1); }
  .btn-sm { padding:5px 12px; font-size:12px; }

  /* CONTENT */
  .content { flex:1; overflow-y:auto; padding:28px; -webkit-overflow-scrolling:touch; }

  /* COURSES GRID */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .section-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; }
  .section-count { font-size:13px; color:var(--text-secondary); margin-left:8px; }

  .courses-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:20px;
  }

  .course-card {
    background:var(--bg-card); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer;
    border:1px solid var(--border); transition:all .2s; position:relative;
  }
  .course-card:hover { border-color:var(--border-light); transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,.4); }
  .course-thumb {
    width:100%; aspect-ratio:16/9; object-fit:cover; background:var(--bg-hover);
    display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  }
  .course-thumb img { width:100%; height:100%; object-fit:cover; }
  .course-thumb-placeholder {
    width:100%; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center;
    font-size:36px; position:relative; overflow:hidden;
  }
  .company-badge {
    position:absolute; bottom:8px; right:8px; width:28px; height:28px; border-radius:6px;
    background:rgba(10,14,26,.85); backdrop-filter:blur(4px); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .company-badge img { width:18px; height:18px; object-fit:contain; }
  .company-badge .mini-placeholder { font-size:10px; font-weight:700; }
  .course-body { padding:14px 16px 16px; }
  .course-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin-bottom:5px; line-height:1.3; }
  .course-desc { font-size:12.5px; color:var(--text-secondary); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:12px; }
  .progress-wrap { margin-top:4px; }
  .progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted); margin-bottom:5px; }
  .progress-bar { height:3px; background:var(--border); border-radius:10px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:10px; transition:width .3s; }
  .icon-btn {
    width:28px; height:28px; border-radius:6px; background:rgba(10,14,26,.85); backdrop-filter:blur(4px);
    border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:13px; transition:all .15s;
  }
  .icon-btn:hover { background:var(--bg-hover); }

  /* MODAL */
  .modal-backdrop {
    position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;
  }
  .modal {
    background:var(--bg-card); border-radius:var(--radius-lg); border:1px solid var(--border-light);
    width:100%; max-width:520px; max-height:90vh; overflow-y:auto;
    box-shadow:0 24px 80px rgba(0,0,0,.6); -webkit-overflow-scrolling:touch;
  }
  .modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; }
  .modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:16px; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-label { font-size:12.5px; font-weight:600; color:var(--text-secondary); letter-spacing:.03em; text-transform:uppercase; }
  .form-input, .form-textarea, .form-select {
    background:var(--bg-secondary); border:1px solid var(--border-light); border-radius:8px;
    color:var(--text-primary); font-family:'DM Sans',sans-serif; font-size:16px; padding:10px 12px;
    outline:none; transition:border-color .15s; width:100%;
    -webkit-appearance:none; appearance:none;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color:var(--accent); }
  .form-textarea { resize:vertical; min-height:80px; }
  .form-select { cursor:pointer; appearance:none; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .close-btn {
    width:28px; height:28px; border-radius:6px; background:transparent; border:none;
    color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:18px; transition:all .15s;
  }
  .close-btn:hover { background:var(--bg-hover); color:var(--text-primary); }

  /* EMPTY STATE */
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; text-align:center; gap:16px; }
  .empty-icon { font-size:56px; opacity:.3; }
  .empty-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--text-secondary); }
  .empty-sub { font-size:14px; color:var(--text-muted); max-width:300px; line-height:1.6; }

  /* COURSE PAGE */
  .course-page { display:flex; height:100%; overflow:hidden; }
  .course-index {
    width:280px; flex-shrink:0; background:var(--bg-sidebar); border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .course-index-header { padding:16px; border-bottom:1px solid var(--border); }
  .course-index-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-secondary); margin-bottom:10px; }
  .course-index-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; line-height:1.4; }
  .progress-mini { margin-top:12px; }
  .course-index-list { flex:1; overflow-y:auto; padding:10px 0; -webkit-overflow-scrolling:touch; }
  /* ── MODULE HEADER ── */
  .modh {
    padding:20px 16px 6px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; background:var(--bg-sidebar); z-index:2;
  }
  .modlbl { font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); }
  .modcnt { font-size:10px; color:var(--text-muted); }
  .modgrp:first-child .modh { padding-top:12px; }

  /* ── CHAPTER ROW ── */
  .crow {
    display:flex; align-items:center; gap:12px;
    padding:11px 14px 11px 20px;
    cursor:pointer; transition:background .12s;
    border-left:3px solid transparent;
  }
  .crow:hover { background:var(--bg-hover); }
  .crow.on { background:var(--accent-glow); border-left-color:var(--accent); }
  .cnum {
    width:28px; height:28px; border-radius:50%;
    background:rgba(255,255,255,.05); border:1.5px solid var(--border-light);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; flex-shrink:0; color:var(--text-secondary);
    transition:all .15s;
  }
  .crow.on .cnum { background:var(--accent); border-color:var(--accent); color:#0a0e1a; }
  .crow.done .cnum { background:var(--accent-dim); border-color:var(--accent-dim); color:#0a0e1a; }
  .cinfo { flex:1; min-width:0; }
  .cchname { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text-secondary); line-height:1.3; }
  .crow.on .cchname { color:var(--text-primary); }
  .cmeta { display:flex; align-items:center; gap:6px; margin-top:3px; }
  .cbdg { font-size:9px; padding:2px 6px; border-radius:4px; font-weight:800; letter-spacing:.04em; }
  .bv { background:rgba(79,142,247,.18); color:var(--accent-2); }
  .bt { background:rgba(167,139,250,.18); color:var(--purple); }
  .cdur { font-size:10.5px; color:var(--text-muted); }
  .crow-acts { display:flex; gap:4px; opacity:0; transition:opacity .1s; flex-shrink:0; }
  .crow:hover .crow-acts { opacity:1; }

  /* COURSE MAIN */
  .course-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .course-topbar {
    height:56px; background:var(--bg-secondary); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 20px; gap:12px; flex-shrink:0;
  }
  .chapter-title-bar { flex:1; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; }
  .course-content-area { flex:1; display:flex; overflow:hidden; }
  .course-viewer { flex:1; overflow-y:auto; padding:24px; -webkit-overflow-scrolling:touch; }
  .video-wrapper { width:100%; aspect-ratio:16/9; background:#000; border-radius:var(--radius-lg); overflow:hidden; margin-bottom:20px; position:relative; }
  .video-wrapper iframe { width:100%; height:100%; border:none; }
  .video-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; background:var(--bg-card); border-radius:var(--radius-lg); color:var(--text-muted); font-size:14px; aspect-ratio:16/9; margin-bottom:20px; border:2px dashed var(--border-light); }

  .desc-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:20px; }
  .desc-section-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; margin-bottom:12px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; }
  .desc-text { font-size:14px; color:var(--text-secondary); line-height:1.7; white-space:pre-wrap; }
  .files-list { display:flex; flex-direction:column; gap:8px; }
  .file-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg-hover); border-radius:8px; border:1px solid var(--border); }
  .file-icon { font-size:18px; }
  .file-name { font-size:13px; flex:1; }
  .links-list { display:flex; flex-direction:column; gap:6px; }
  .link-item { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--accent-2); padding:6px 0; text-decoration:none; }
  .link-item:hover { color:var(--accent); }

  /* NOTES PANEL */
  .notes-panel {
    width:300px; flex-shrink:0; background:var(--bg-card); border-left:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden; transition:width .2s;
  }
  .notes-panel.hidden { width:0; overflow:hidden; }
  .notes-panel-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .notes-panel-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-secondary); }
  .notes-area { flex:1; padding:12px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
  .note-textarea {
    width:100%; flex:1; background:var(--bg-secondary); border:1px solid var(--border-light); border-radius:8px;
    color:var(--text-primary); font-family:'DM Sans',sans-serif; font-size:16px; padding:12px;
    outline:none; resize:none; transition:border-color .15s; min-height:200px;
    -webkit-appearance:none;
  }
  .note-textarea:focus { border-color:var(--accent); }
  .note-saved { font-size:11px; color:var(--accent); text-align:right; height:14px; }

  /* CHAPTER EDITOR (modal variant) */
  .chapter-editor-modal .modal { max-width:680px; }
  .tabs { display:flex; gap:2px; background:var(--bg-secondary); border-radius:8px; padding:3px; }
  .tab-btn { padding:6px 14px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:transparent; color:var(--text-secondary); transition:all .15s; }
  .tab-btn.active { background:var(--bg-card); color:var(--text-primary); }

  /* BADGE */
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge-green { background:rgba(16,230,140,.12); color:var(--accent); }
  .badge-blue { background:rgba(79,142,247,.12); color:var(--accent-2); }

  /* MANAGE CHAPTERS BTN */
  .add-chapter-row { padding:10px 16px; border-top:1px solid var(--border); flex-shrink:0; }

  /* SEARCH */
  .search-input-wrap { position:relative; }
  .search-input { padding-left:34px !important; }
  .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; pointer-events:none; }

  /* TAG */
  .tag { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:4px; font-size:11px; background:var(--bg-hover); color:var(--text-secondary); border:1px solid var(--border); }

  /* CHIP */
  .company-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  .company-chip {
    display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px;
    cursor:pointer; border:1.5px solid var(--border); background:var(--bg-card);
    font-size:12.5px; font-weight:600; transition:all .15s;
  }
  .company-chip:hover { border-color:var(--border-light); background:var(--bg-hover); }
  .company-chip.active { border-color:var(--accent); background:var(--accent-glow); color:var(--accent); }
  .company-chip img { width:16px; height:16px; object-fit:contain; border-radius:3px; }

  /* MARK COMPLETE */
  .complete-btn { display:flex; align-items:center; gap:6px; }
  .checkbox-custom { width:18px; height:18px; border-radius:4px; border:2px solid var(--border-light); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; flex-shrink:0; }
  .checkbox-custom.checked { background:var(--accent); border-color:var(--accent); }
  .checkbox-custom.checked::after { content:'✓'; font-size:11px; font-weight:700; color:#0a0e1a; }

  /* GRADIENT COLORS FOR PLACEHOLDER THUMBS */
  .grad-0 { background:linear-gradient(135deg,#1a2a4a,#0d3d2b); }
  .grad-1 { background:linear-gradient(135deg,#2d1a4a,#1a0d3d); }
  .grad-2 { background:linear-gradient(135deg,#4a1a1a,#3d0d0d); }
  .grad-3 { background:linear-gradient(135deg,#1a4a2d,#0d3d1a); }
  .grad-4 { background:linear-gradient(135deg,#4a3a1a,#3d2d0d); }
  .grad-5 { background:linear-gradient(135deg,#1a3a4a,#0d2d3d); }

  @media (max-width:768px) {
    .course-index { width:220px; }
    .notes-panel { width:240px; }
    .courses-grid { grid-template-columns:1fr 1fr; }
  }

  /* ── iOS / MOBILE LAYOUT ── */
  /* Bottom nav bar for mobile */
  .mobile-bottom-nav {
    display:none;
    position:fixed; bottom:0; left:0; right:0;
    background:var(--bg-sidebar); border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom);
    z-index:200; flex-direction:row; align-items:stretch;
    height:calc(56px + env(safe-area-inset-bottom));
  }
  .mobile-nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; cursor:pointer; padding:8px 4px; min-height:56px;
    border:none; background:transparent; color:var(--text-muted); font-size:10px;
    font-family:'DM Sans',sans-serif; font-weight:600; transition:color .15s;
  }
  .mobile-nav-item.active { color:var(--accent); }
  .mobile-nav-item svg { flex-shrink:0; }
  .mobile-nav-icon { font-size:20px; line-height:1; }

  /* Mobile overlay panel for sidebar content */
  .mobile-sidebar-sheet {
    display:none;
    position:fixed; inset:0; z-index:300;
  }
  .mobile-sidebar-sheet.open { display:flex; flex-direction:column; }
  .mobile-sheet-backdrop {
    position:absolute; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px);
  }
  .mobile-sheet-panel {
    position:absolute; top:0; bottom:0; left:0; width:80%; max-width:320px;
    background:var(--bg-sidebar); border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;
    padding-top:env(safe-area-inset-top);
    transform:translateX(-100%); transition:transform .25s ease;
  }
  .mobile-sidebar-sheet.open .mobile-sheet-panel { transform:translateX(0); }

  /* Mobile notes bottom sheet */
  .mobile-notes-sheet {
    display:none;
    position:fixed; inset:0; z-index:300;
  }
  .mobile-notes-sheet.open { display:flex; flex-direction:column; }
  .mobile-notes-sheet-panel {
    position:absolute; bottom:0; left:0; right:0;
    background:var(--bg-card); border-radius:20px 20px 0 0; border-top:1px solid var(--border-light);
    display:flex; flex-direction:column;
    height:70vh; padding-bottom:env(safe-area-inset-bottom);
    transform:translateY(100%); transition:transform .3s ease;
  }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── UTILS ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const STORAGE_KEY = 'courseflow_v2';

// ─── HARDCODED DEFAULT DATA ───────────────────────────────────────────────────
// Edit this object to pre-load your courses on any new computer.
// Your live changes are still saved to localStorage and take priority.
const DEFAULT_DATA = {
  "companies": [
  ],
  "courses": [
  ]
};
// ─────────────────────────────────────────────────────────────────────────────

const load = () => {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return JSON.parse(stored);
    // No localStorage found — seed with hardcoded default data
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
};
const save = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

const GRAD_COLORS = ['#10e68c','#4f8ef7','#f56565','#f6c90e','#a78bfa','#fb923c'];

function getFaviconUrl(url) {
  if (!url) return null;
  try {
    const hostname = new URL(url.startsWith('http') ? url : 'https://'+url).hostname;
    return `https://www.google.com/s2/favicons?domain=${hostname}&sz=64`;
  } catch { return null; }
}

function CompanyIcon({ company, size=26 }) {
  const [err, setErr] = useState(false);
  const faviconUrl = company?.icon || getFaviconUrl(company?.url);
  const color = GRAD_COLORS[(company?.name||'').charCodeAt(0) % GRAD_COLORS.length];
  if (faviconUrl && !err) {
    return <img src={faviconUrl} width={size} height={size} style={{borderRadius:5,objectFit:'contain'}} onError={()=>setErr(true)} />;
  }
  return (
    <div className="favicon-placeholder" style={{width:size,height:size,background:color+'22',color,fontSize:size*.5,borderRadius:5}}>
      {(company?.name||'?')[0].toUpperCase()}
    </div>
  );
}

// ─── EMBED HELPERS ────────────────────────────────────────────────────────────
function getEmbedUrl(url) {
  if (!url) return null;

  // Vimeo
  const vimeoMatch = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (vimeoMatch)
    return `https://player.vimeo.com/video/${vimeoMatch[1]}?autoplay=0&muted=0&title=0&byline=0&portrait=0`;

  // YouTube
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  if (ytMatch)
    return `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=0&mute=0`;

  // Wistia
  if (url.includes('wistia')) {
    const id = url.split('/').pop();
    return `https://fast.wistia.net/embed/iframe/${id}?autoplay=0&muted=0`;
  }

  // Hotmart
  if (url.includes('player.hotmart.com')) {
  return url;
  }

  // fallback
  if (url.includes('embed') || url.startsWith('https')) {
    return url + (url.includes('?') ? '&autoplay=1' : '?autoplay=1');
  }

  return null;
}

    };
    if (companies.some(c => c.name.toLowerCase() === newCompany.toLowerCase())) {
  alert("Platform already exists");
  return;
}
    // update parent
    onSave(null,nc);
setCompanyId(nc.id);


    // reset UI
    setAddingCompany(false);
    setNewCompany('');
    setNewCompanyUrl('');
    setNewCompanyIcon('');
  }
}}>Add Platform</button>
                  <button className="btn btn-secondary btn-sm" onClick={()=>setAddingCompany(false)}>Cancel</button>
                </div>
              </div>

          </div>
          <div className="form-group">
            <label className="form-label">Description (optional)</label>
            <textarea className="form-textarea" placeholder="Brief overview of this course..." value={desc} onChange={e=>setDesc(e.target.value)} />

        </div>
        <div className="modal-footer">

function HomePage({ data, onOpenCourse, onUpdate, filterCompany_, showImportMobile, setShowImportMobile, showAddCourseMobile, setShowAddCourseMobile }) {

const [importError, setImportError] = useState('');

  const companies = data.companies;
  const courses = data.courses;

const handleFileImport = (file) => {
  if (!file) return;

  if (!file.name.endsWith('.json')) {
    setImportError("Please upload a valid JSON file.");
    return;
  }

  const reader = new FileReader();

  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);

      if (!parsed.courses || !parsed.companies) {
        setImportError("Invalid file format.");
        return;
      }

      onUpdate({
        courses: parsed.courses,
        companies: parsed.companies
      });

      setShowImport(false);
      setImportError('');

    } catch {
      setImportError("Invalid JSON file.");
    }
  };

  reader.readAsText(file);
};

  const filtered = courses.filter(c => {
    const matchCompany = filterCompany==='all' || c.companyId===filterCompany;
    const matchSearch = !search || c.title.toLowerCase().includes(search.toLowerCase());
    return matchCompany && matchSearch;
  });

  useEffect(() => {
  const handler = () => setMenuOpen(null);
  window.addEventListener('click', handler);
  return () => window.removeEventListener('click', handler);
}, []);

const handleSaveCourse = (course, newCompany, updatedCompanies) => {

  // 🔥 delete platform case
  if(updatedCompanies){
    onUpdate({...data, companies: updatedCompanies});
    return;
  }

  // existing logic
  if(newCompany){
    const updated = { ...data, companies: [...data.companies, newCompany] };
    onUpdate(updated);
    return;
  }

 if(course){
  if(editCourse){
    // update existing course
    const updatedCourses = data.courses.map(c =>
      c.id === editCourse.id ? { ...c, ...course } : c
    );

    onUpdate({ ...data, courses: updatedCourses });
  } else {
    // add new course
    const newCourse = {
      id: uid(),
      ...course,
      chapters: [],
      progress: 0
    };

    onUpdate({ ...data, courses: [...data.courses, newCourse] });
  }
}
};

 const handleDelete = (id, e) => {
  e.stopPropagation();

  const course = data.courses.find(c => c.id === id);

    const newCourses = data.courses.filter(c => c.id !== id);

    const usedCompanyIds = newCourses
      .map(c => c.companyId)
      .filter(Boolean);

    const newCompanies = data.companies.filter(co =>
      usedCompanyIds.includes(co.id)
    );

      companies: newCompanies
    });
  }
};

  const handleEdit = (course, e) => { e.stopPropagation(); setEditCourse(course); setShowAdd(true); };

  const [toast, setToast] = useState(false);
  const [copyToast, setCopyToast] = useState(false);

const exportData = () => {
  const dataToExport = {
    companies: data.companies,
    courses: data.courses
  };

  const json = JSON.stringify(dataToExport, null, 2);

  // create file
  const blob = new Blob([json], { type: "application/json" });

  // create download link
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  const date = new Date().toISOString().replace(/[:.]/g,'-');

  a.href = url;
  a.download = `courseflow-backup-${date}.json`;

  document.body.appendChild(a);
  a.click();

  // cleanup
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast();
};

const copyDataToClipboard = () => {
  const dataToExport = {
    companies: data.companies,
    courses: data.courses
  };
  const json = JSON.stringify(dataToExport, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    setCopyToast(true);
    setTimeout(() => setCopyToast(false), 2500);
  });
};



const showToast = () => {
  setToast(true);
  setTimeout(() => setToast(false), 2500);
};

</div>
                  {course.thumbnail ? (
                    <div className="course-thumb">
                      <img src={course.thumbnail} alt={course.title} onError={e=>{e.target.style.display='none'; e.target.nextSibling.style.display='flex';}} />
                      <div style={{display:'none',width:'100%',aspectRatio:'16/9',alignItems:'center',justifyContent:'center',fontSize:36}} className={`grad-${i%6}`}>📖</div>

// ─── COURSE PAGE ─────────────────────────────────────────────────────────────
function CoursePage({ courseId, data, onBack, onUpdate, mobileNotesOpen, setMobileNotesOpen }) {
  const course = data.courses.find(c=>c.id===courseId);
  const company = data.companies.find(c=>c.id===course?.companyId);
  const [activeChapter, setActiveChapter] = useState(0);
  const [showNotes, setShowNotes] = useState(false);
  const [showAddChapter, setShowAddChapter] = useState(false);
  const [editChapter, setEditChapter] = useState(null);
  const [noteSaved, setNoteSaved] = useState(false);
  const noteTimer = useRef(null);

  
  if (!course) return null;
  const chapters = course.chapters||[];
  const chapter = chapters[activeChapter];

  const updateCourse = (updated) => {
    const courses = data.courses.map(c=>c.id===courseId?updated:c);
    onUpdate({...data, courses});
  };



  const saveNote = (val) => {
    const newChapters = chapters.map((c,i)=>i===activeChapter?{...c,notes:val}:c);
    updateCourse({...course,chapters:newChapters});
    clearTimeout(noteTimer.current);
    noteTimer.current = setTimeout(()=>setNoteSaved(true), 300);
    setTimeout(()=>setNoteSaved(false),2000);
  };

  const toggleComplete = () => {
    const newChapters = chapters.map((c,i)=>i===activeChapter?{...c,completed:!c.completed}:c);
    updateCourse({...course,chapters:newChapters});
  };

  const handleSaveChapter = (data) => {
    let newChapters;
    if (editChapter!==null) {
      newChapters = chapters.map((c,i)=>i===editChapter?{...c,...data}:c);
      setEditChapter(null);
    } else {
      newChapters = [...chapters,{id:uid(),...data,completed:false,notes:''}];
      setActiveChapter(newChapters.length-1);
    }
    updateCourse({...course,chapters:newChapters});
    setShowAddChapter(false);
  };

  const handleDeleteChapter = (idx) => {
    if (!confirm('Delete this chapter?')) return;
    const newChapters = chapters.filter((_,i)=>i!==idx);
    updateCourse({...course,chapters:newChapters});
    if (activeChapter>=newChapters.length) setActiveChapter(Math.max(0,newChapters.length-1));
  };

  const embed = chapter ? getEmbedUrl(chapter.videoUrl) : null;
  const doneCount = chapters.filter(c=>c.completed).length;
  const pct = chapters.length>0?Math.round((doneCount/chapters.length)*100):0;

  // Build module groups in order of first appearance
  const modOrder = []; const modMap = {};
  chapters.forEach((c,i) => {
    const m = c.module || '__none__';
    if (!modMap[m]) { modMap[m] = []; modOrder.push(m); }
    modMap[m].push({c, i});
  });



  return (
    <div className="course-page" style={{height:'100%'}}>
      {/* LEFT INDEX */}
      <div className="course-index">
        <div className="course-index-header">
          <button className="btn btn-secondary btn-sm" onClick={onBack} style={{marginBottom:10}}>← Back</button>
          <div className="course-index-title">Course Index</div>
          <div className="course-index-name">{course.title}</div>
          <div className="progress-mini">
            <div className="progress-label" style={{fontSize:11,color:'var(--text-muted)',display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span>{doneCount}/{chapters.length} done</span>
              <span style={{color:'var(--accent)'}}>{pct}%</span>
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
          </div>
        </div>

        <div className="course-index-list">
          {chapters.length===0 && (
            <div style={{padding:'28px 16px',color:'var(--text-muted)',fontSize:13,textAlign:'center',lineHeight:1.7}}>
              No chapters yet.<br/>Add your first one below.
            </div>
          )}

          {modOrder.map((mod, mi) => {
            const items = modMap[mod];
            const hasM = mod !== '__none__';
            const mDone = items.filter(({c}) => c.completed).length;
            return (
              <div key={mod} className="modgrp">
                {hasM && (
                  <div className="modh">
                    <span className="modlbl">{mod}</span>
                    <span className="modcnt">{mDone}/{items.length}</span>
                  </div>
                )}
                {items.map(({c, i}) => (
                  <div
                    key={c.id||i}
                    className={`crow ${i===activeChapter?'on':''} ${c.completed?'done':''}`}
                    onClick={()=>setActiveChapter(i)}
                  >
                    <div className="cnum">{c.completed?'✓':i+1}</div>
                    <div className="cinfo">
                      <div className="cchname">{c.name}</div>
                      <div className="cmeta">
                        <span className={`cbdg ${c.type==='video'?'bv':'bt'}`}>{c.type==='video'?'▶ Video':'✦ Text'}</span>
                        {c.duration && <span className="cdur">{c.duration}</span>}
                      </div>
                    </div>
                    <div className="crow-acts">
                      <div
                        className="icon-btn"
                        style={{width:24,height:24,fontSize:11}}
                        title="Edit"
                        onClick={e=>{e.stopPropagation();setEditChapter(i);setShowAddChapter(true);}}
                      >✏️</div>
                      <div
                        className="icon-btn"
                        style={{width:24,height:24,fontSize:11}}
                        title="Delete"
                        onClick={e=>{e.stopPropagation();handleDeleteChapter(i);}}
                      >🗑</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          })}
        </div>

        <div className="add-chapter-row">
          <button
            className="btn btn-secondary"
            style={{width:'100%',justifyContent:'center'}}
            onClick={()=>{setEditChapter(null);setShowAddChapter(true);}}
          >
            + Add Chapter
          </button>
        </div>
      </div>

      {/* MAIN CONTENT */}
      <div className="course-main">
        <div className="course-topbar">
          {company && <CompanyIcon company={company} size={22}/>}
          <div className="chapter-title-bar">{chapter?.name||'Select a chapter'}</div>
          {chapter && (
            <div className="complete-btn" onClick={toggleComplete} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
              <div className={`checkbox-custom ${chapter.completed?'checked':''}`}/>
              <span style={{fontSize:13,color:chapter.completed?'var(--accent)':'var(--text-secondary)',fontWeight:600}}>
                {chapter.completed?'Completed':'Mark Complete'}
              </span>
            </div>
          )}
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowNotes(v=>!v)} title="Toggle Notes">
            {showNotes?'◧ Hide Notes':'◨ Notes'}
          </button>
        </div>

        <div className="course-content-area">
          <div className="course-viewer">
            {!chapter ? (
              <div className="empty-state" style={{padding:'60px 20px'}}>
                <div className="empty-icon">📖</div>
                <div className="empty-title">No chapters yet</div>
                <div className="empty-sub">Add chapters to start building your course content.</div>
                <button className="btn btn-primary" onClick={()=>setShowAddChapter(true)}>Add First Chapter</button>
              </div>
            ) : (
              <>
                {/* VIDEO */}
                {chapter.type==='video' && (
                  embed ? (
                    <div className="video-wrapper">
  <iframe
    key={embed}
    src={embed}
    allow="autoplay; fullscreen; picture-in-picture"
    allowFullScreen
  />
</div>
                  ) : (
                    <div className="video-placeholder">
                      <span style={{fontSize:40}}>▶</span>
                      <span>{chapter.videoUrl?'Invalid video URL — try a Vimeo, YouTube, or Wistia link':'No video URL set for this chapter'}</span>
                      <button className="btn btn-secondary btn-sm" onClick={()=>{setEditChapter(activeChapter);setShowAddChapter(true);}}>Add Video URL</button>
                    </div>
                  )
                )}

                {/* DESCRIPTION */}
                {chapter.description && (
                  <div className="desc-section">
                    <div className="desc-section-title">📋 Description</div>
                    <div className="desc-text">{chapter.description}</div>
                  </div>
                )}

                {/* LINKS */}
                {chapter.links?.length>0 && (
                  <div className="desc-section">
                    <div className="desc-section-title">🔗 Resources</div>
                    <div className="links-list">
  {chapter.links.map((l,i)=>{
    const link = typeof l === 'string'
      ? { label: l, url: l }
      : l;

    return (
      <a
        key={i}
        href={link.url}
        target="_blank"
        rel="noopener noreferrer"
        className="link-item"
      >
        🔗 {link.label || link.url}
      </a>
    );
  })}
</div>
                  </div>
                )}

                {/* FILES */}
                {chapter.files?.length>0 && (
                  <div className="desc-section">
                    <div className="desc-section-title">📁 Files</div>
                    <div className="files-list">
  {chapter.files.map((f,i)=>{
    const file = typeof f === 'string'
      ? { name: f, url: '' }
      : f;

    const isLinkStyle = !file.name && file.url;

    return (
      <a
        key={i}
        href={file.url || '#'}
        target="_blank"
        rel="noopener noreferrer"
        className="file-item"
        style={{
          textDecoration:'none',
          color: isLinkStyle ? 'var(--accent-2)' : 'inherit',
          cursor: file.url ? 'pointer' : 'default'
        }}
      >
        <span className="file-icon">
          {isLinkStyle ? '🔗' : '📄'}
        </span>

        <span
          className="file-name"
          style={{
            textDecoration: 'none'
          }}
        >
          {file.name || file.url}
        </span>
      </a>
    );
  })}
</div>
                  </div>
                )}

                {/* EMPTY chapter hint */}
                {!chapter.description && !chapter.links?.length && !chapter.files?.length && chapter.type==='text' && (
                  <div className="desc-section" style={{textAlign:'center',padding:'40px 20px',color:'var(--text-muted)'}}>
                    <div style={{fontSize:32,marginBottom:10}}>📝</div>
                    <div style={{fontSize:14}}>No content for this chapter yet.</div>
                    <button className="btn btn-secondary btn-sm" style={{marginTop:12}} onClick={()=>{setEditChapter(activeChapter);setShowAddChapter(true);}}>Add Content</button>
                  </div>
                )}
              </>
            )}
          </div>

          {/* NOTES PANEL */}
          <div className={`notes-panel ${showNotes?'':'hidden'}`}>
            {showNotes && <>
              <div className="notes-panel-header">
                <span className="notes-panel-title">📓 My Notes</span>
                <span style={{fontSize:11,color:'var(--text-muted)'}}>{chapter?.name}</span>
              </div>
              <div className="notes-area">
                <textarea
                  className="note-textarea"
                  placeholder={`Notes for "${chapter?.name||'this chapter'}"...\n\nJot down key points, code snippets, questions — anything you want to remember.`}
                  value={chapter?.notes||''}
                  onChange={e=>saveNote(e.target.value)}
                />
                <div className="note-saved">{noteSaved?'✓ Saved':''}</div>
              </div>
            </>}
          </div>
        </div>
      </div>

      {/* MOBILE NOTES BOTTOM SHEET */}
      <div className={`mobile-notes-sheet ${mobileNotesOpen?'open':''}`}>
        <div className="mobile-sheet-backdrop" onClick={()=>{if(setMobileNotesOpen)setMobileNotesOpen(false); setShowNotes(false);}}/>
        <div className="mobile-notes-sheet-panel">
          <div className="mobile-notes-handle"/>
          <div className="notes-panel-header" style={{padding:'8px 16px 12px'}}>
            <span className="notes-panel-title">📓 My Notes</span>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:'var(--text-muted)'}}>{chapter?.name}</span>
              <button className="close-btn" onClick={()=>{if(setMobileNotesOpen)setMobileNotesOpen(false); setShowNotes(false);}}>×</button>
            </div>
          </div>
          <div className="notes-area" style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            <textarea
              className="note-textarea"
              style={{flex:1,minHeight:0,fontSize:16}}
              placeholder={`Notes for "${chapter?.name||'this chapter'}"...\n\nJot down key points, questions — anything to remember.`}
              value={chapter?.notes||''}
              onChange={e=>saveNote(e.target.value)}
            />
            <div className="note-saved" style={{textAlign:'right',padding:'4px 0'}}>{noteSaved?'✓ Saved':''}</div>
          </div>
        </div>
      </div>

      {/* CHAPTER MODAL */}
      {showAddChapter && (
        <ChapterModal
          chapter={editChapter!==null?chapters[editChapter]:null}
          onClose={()=>{setShowAddChapter(false);setEditChapter(null);}}
          onSave={handleSaveChapter}
        />
      )}
    </div>
  );
}

        <div className="course-index-title">Course Index</div>
        <div className="course-index-name">{course.title}</div>
        <div className="progress-mini">

          const items = modMap[mod];
          const hasM = mod !== '__none__';
          const mDone = items.filter(({c}) => c.completed).length;
          return (
            <div key={mod} className="modgrp">
              {hasM && (
                <div className="modh">
                  <span className="modlbl">{mod}</span>
                  <span className="modcnt">{mDone}/{items.length}</span>
                </div>
              )}
              {items.map(({c, i}) => (
                <div key={c.id||i} className={`crow ${c.completed?'done':''}`}
                  style={{paddingRight:10}}
                  onClick={()=>{onClose();}}
                >
                  <div className="cnum">{c.completed?'✓':i+1}</div>
                  <div className="cinfo">
                    <div className="cchname">{c.name}</div>
                    <div className="cmeta">
                      <span className={`cbdg ${c.type==='video'?'bv':'bt'}`}>{c.type==='video'?'▶ Video':'✦ Text'}</span>
                      {c.duration && <span className="cdur">{c.duration}</span>}
                    </div>
                  </div>
                  <div className="crow-acts" style={{opacity:1}}>
                    <div className="icon-btn" style={{width:32,height:32,fontSize:13}} title="Edit"
                      onClick={e=>{e.stopPropagation();setEditChapter(i);setShowAddChapter(true);}}>✏️</div>
                    <div className="icon-btn" style={{width:32,height:32,fontSize:13}} title="Delete"
                      onClick={e=>{e.stopPropagation();handleDeleteChapter(i);}}>🗑</div>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>
      <div className="add-chapter-row">
        <button className="btn btn-secondary" style={{width:'100%',justifyContent:'center'}}
          onClick={()=>{setEditChapter(null);setShowAddChapter(true);}}>
          + Add Chapter
        </button>
      </div>
      {showAddChapter && (
        <ChapterModal
          chapter={editChapter!==null?chapters[editChapter]:null}
          onClose={()=>{setShowAddChapter(false);setEditChapter(null);}}
          onSave={handleSaveChapter}
        />
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(load);
  const [view, setView] = useState('home'); // 'home' | courseId
  const [filterCompany, setFilterCompany] = useState('all');
  const [mobileNavOpen, setMobileNavOpen] = useState(false); // sidebar sheet on mobile
  const [mobileNotesOpen, setMobileNotesOpen] = useState(false); // notes sheet on mobile
  const [mobileNotesState, setMobileNotesState] = useState(false); // syncs showNotes in CoursePage
  const [showImportMobile, setShowImportMobile] = useState(false);
  const [showAddCourseMobile, setShowAddCourseMobile] = useState(false);

  const exportDataMobile = () => {
    const d = { companies: data.companies, courses: data.courses };
    const blob = new Blob([JSON.stringify(d, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `courseflow-backup-${new Date().toISOString().replace(/[:.]/g,'-')}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  const activeCompanyId =
  view === 'home'
    ? filterCompany
    : data.courses.find(c => c.id === view)?.companyId;

  const handleUpdate = (newData) => { setData(newData); save(newData); };

  const courseCompanies = data.companies.filter(co =>
  data.courses.some(c => c.companyId === co.id)
);

  // Close mobile sheet on back-nav
  const handleBack = () => { setView('home'); setMobileNavOpen(false); };

  return (
    <div style={{display:'flex',height:'100vh',height:'100dvh',width:'100vw',overflow:'hidden'}}>
      {/* DESKTOP SIDEBAR */}
      <div className="sidebar">
        <div className="sidebar-logo" onClick={()=>setView('home')} title="CourseFlow">CF</div>
        <div className="sidebar-divider"/>
        <div className={`sidebar-item ${view==='home'&&filterCompany==='all'?'active':''}`} onClick={()=>{setView('home');setFilterCompany('all');}}>
          <span style={{fontSize:18}}>⬡</span>
          <span className="sidebar-tooltip">All Courses</span>
        </div>
        {courseCompanies.map(co=>(
          <div
            key={co.id}
            className={`sidebar-item ${
              (view !== 'home' && data.courses.find(c=>c.id===view)?.companyId === co.id) ||
              (view === 'home' && filterCompany === co.id)
                ? 'active'
                : ''
            }`} onClick={()=>{setView('home');setFilterCompany(co.id);}}>
            <CompanyIcon company={co} size={26}/>
            <span className="sidebar-tooltip">{co.name}</span>
          </div>
        ))}
      </div>

      {/* MAIN */}
      <div className="main">
        {view==='home'
          ? <HomePageWrapper
              data={data}
              onOpenCourse={id=>setView(id)}
              onUpdate={handleUpdate}
              initialFilter={filterCompany}
              showImportMobile={showImportMobile}
              setShowImportMobile={setShowImportMobile}
              showAddCourseMobile={showAddCourseMobile}
              setShowAddCourseMobile={setShowAddCourseMobile}
            />
          : <CoursePage
              courseId={view}
              data={data}
              onBack={handleBack}
              onUpdate={handleUpdate}
              mobileNotesOpen={mobileNotesOpen}
              setMobileNotesOpen={setMobileNotesOpen}
              mobileNotesState={mobileNotesState}
              setMobileNotesState={setMobileNotesState}
            />
        }
      </div>

      {/* MOBILE BOTTOM NAV */}
      <nav className="mobile-bottom-nav">
        {view !== 'home' ? (
          <>
            <button className="mobile-nav-item" onClick={handleBack}>
              <span className="mobile-nav-icon">←</span>
              <span>Home</span>
            </button>
            <button className="mobile-nav-item" onClick={()=>setMobileNavOpen(true)}>
              <span className="mobile-nav-icon">☰</span>
              <span>Chapters</span>
            </button>
            <button className={`mobile-nav-item ${mobileNotesOpen?'active':''}`} onClick={()=>{
              const opening = !mobileNotesOpen;
              setMobileNotesOpen(opening);
              setMobileNotesState(opening);
            }}>
              <span className="mobile-nav-icon">📓</span>
              <span>{mobileNotesOpen?'Hide Notes':'Notes'}</span>
            </button>
          </>
        ) : (
          <>
            <button className="mobile-nav-item" onClick={()=>setShowImportMobile(true)}>
              <span className="mobile-nav-icon">📥</span>
              <span>Import</span>
            </button>
            <button className="mobile-nav-item" onClick={exportDataMobile}>
              <span className="mobile-nav-icon">💾</span>
              <span>Export</span>
            </button>
            <button className="mobile-nav-item" onClick={()=>setShowAddCourseMobile(true)}>
              <span className="mobile-nav-icon">＋</span>
              <span>Add Course</span>
            </button>
          </>
        )}
      </nav>

      {/* MOBILE SIDEBAR/CHAPTERS SHEET */}
      <div className={`mobile-sidebar-sheet ${mobileNavOpen?'open':''}`}>
        <div className="mobile-sheet-backdrop" onClick={() => setMobileSidebarOpen(false)}/>
        <div className="mobile-sheet-panel" onClick={(e) => e.stopPropagation()}>
          {view !== 'home' && (
            <MobileCourseIndex
              courseId={view}
              data={data}
              onUpdate={handleUpdate}
              onClose={()=>setMobileNavOpen(false)}
            />
          )}
        </div>
      </div>
    </div>
  );
}

// Pass filterCompany to HomePage
function HomePageWrapper({ data, onOpenCourse, onUpdate, initialFilter, showImportMobile, setShowImportMobile, showAddCourseMobile, setShowAddCourseMobile }) {
  const [filterCompany, setFilterCompany] = useState(initialFilter||'all');
  useEffect(()=>setFilterCompany(initialFilter||'all'),[initialFilter]);
  // re-export
  return <HomePage data={data} onOpenCourse={onOpenCourse} onUpdate={onUpdate} filterCompany_={filterCompany}
    showImportMobile={showImportMobile} setShowImportMobile={setShowImportMobile}
    showAddCourseMobile={showAddCourseMobile} setShowAddCourseMobile={setShowAddCourseMobile}
  />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
